<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="cot-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c4a8"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
    <linearGradient id="cot-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8a9a"/>
      <stop offset="100%" stop-color="#1a4a56"/>
    </linearGradient>
    <filter id="cot-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Chain-of-Thought Prompting: Accuracy Gains</text>
  <!-- Step 1 -->
  <g transform="translate(80,65)">
    <rect x="0" y="0" width="180" height="280" rx="12" fill="#132f38" stroke="#1a4a56" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">STEP 1</text>
    <text x="90" y="52" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Standard Prompt</text>
    <text x="90" y="72" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">"What is the answer?"</text>
    <!-- Bar background -->
    <rect x="30" y="90" width="120" height="140" rx="6" fill="#0f2d35"/>
    <!-- Bar fill 50% -->
    <rect x="30" y="160" width="120" height="70" rx="0 0 6 6" fill="url(#cot-teal)"/>
    <rect x="30" y="160" width="120" height="3" fill="#3d8a9a" opacity="0.8"/>
    <!-- Percentage -->
    <text x="90" y="200" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="800">50%</text>
    <text x="90" y="248" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">Accuracy</text>
    <text x="90" y="270" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">Baseline</text>
  </g>
  <!-- Arrow 1→2 -->
  <g transform="translate(265,185)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#3d8a9a" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="40,-5 50,0 40,5" fill="#3d8a9a"/>
    <text x="25" y="18" text-anchor="middle" fill="#2a6a7a" font-family="system-ui,sans-serif" font-size="9">+25%</text>
  </g>
  <!-- Step 2 -->
  <g transform="translate(310,65)">
    <rect x="0" y="0" width="180" height="280" rx="12" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">STEP 2</text>
    <text x="90" y="52" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Zero-Shot CoT</text>
    <text x="90" y="72" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">"Let's think step by step"</text>
    <!-- Bar background -->
    <rect x="30" y="90" width="120" height="140" rx="6" fill="#0f2d35"/>
    <!-- Bar fill 75% -->
    <rect x="30" y="125" width="120" height="105" rx="0 0 6 6" fill="url(#cot-teal)"/>
    <rect x="30" y="125" width="120" height="3" fill="#3d8a9a" opacity="0.8"/>
    <!-- Percentage -->
    <text x="90" y="180" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="800">75%</text>
    <text x="90" y="248" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">Accuracy</text>
    <text x="90" y="270" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">+50% Improvement</text>
  </g>
  <!-- Arrow 2→3 -->
  <g transform="translate(495,185)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#e8a87c" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="40,-5 50,0 40,5" fill="#e8a87c"/>
    <text x="25" y="18" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="9">+15%</text>
  </g>
  <!-- Step 3 -->
  <g transform="translate(540,65)">
    <rect x="0" y="0" width="180" height="280" rx="12" fill="#132f38" stroke="#e8a87c" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="11" font-weight="600">STEP 3</text>
    <text x="90" y="52" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Few-Shot CoT</text>
    <text x="90" y="72" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">With worked examples</text>
    <!-- Bar background -->
    <rect x="30" y="90" width="120" height="140" rx="6" fill="#0f2d35"/>
    <!-- Bar fill 90% -->
    <rect x="30" y="104" width="120" height="126" rx="0 0 6 6" fill="url(#cot-gold)"/>
    <rect x="30" y="104" width="120" height="3" fill="#f0c4a8" opacity="0.8"/>
    <!-- Percentage -->
    <text x="90" y="170" text-anchor="middle" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="28" font-weight="800">90%</text>
    <text x="90" y="248" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">Accuracy</text>
    <text x="90" y="270" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10" font-weight="700">+80% vs Baseline</text>
  </g>
  <!-- Bottom insight -->
  <rect x="180" y="360" width="440" height="30" rx="15" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="400" y="380" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="11">Based on GSM8K math reasoning benchmark (Wei et al., 2022)</text>
</svg>