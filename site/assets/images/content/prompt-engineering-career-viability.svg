<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="trendFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="demandBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f0c4a8;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>

  <!-- Title -->
  <text x="295" y="30" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Is Prompt Engineering a Real Career?</text>

  <!-- Chart area -->
  <text x="295" y="55" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Job postings mentioning "prompt engineering" (monthly, indexed)</text>

  <!-- Y axis -->
  <line x1="70" y1="70" x2="70" y2="320" stroke="#1a4a56" stroke-width="1"/>
  <text x="60" y="78" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="end">1,000</text>
  <text x="60" y="141" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="end">750</text>
  <text x="60" y="203" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="end">500</text>
  <text x="60" y="266" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="end">250</text>
  <text x="60" y="325" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="end">0</text>

  <!-- Gridlines -->
  <line x1="70" y1="75" x2="530" y2="75" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="70" y1="138" x2="530" y2="138" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="70" y1="200" x2="530" y2="200" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="70" y1="263" x2="530" y2="263" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>

  <!-- X axis -->
  <line x1="70" y1="320" x2="530" y2="320" stroke="#1a4a56" stroke-width="1"/>
  <text x="93" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q1'24</text>
  <text x="151" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q2'24</text>
  <text x="209" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q3'24</text>
  <text x="267" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q4'24</text>
  <text x="325" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q1'25</text>
  <text x="383" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q2'25</text>
  <text x="441" y="338" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Q3'25</text>
  <text x="499" y="338" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Q1'26</text>

  <!-- Area fill under the line -->
  <polygon points="93,295 151,278 209,260 267,238 325,210 383,175 441,140 499,95 499,320 93,320" fill="url(#trendFill)"/>

  <!-- Trend line -->
  <polyline points="93,295 151,278 209,260 267,238 325,210 383,175 441,140 499,95" fill="none" stroke="#e8a87c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="93" cy="295" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="151" cy="278" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="209" cy="260" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="267" cy="238" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="325" cy="210" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="383" cy="175" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="441" cy="140" r="4" fill="#0f2d35" stroke="#e8a87c" stroke-width="2"/>
  <circle cx="499" cy="95" r="6" fill="#e8a87c" stroke="#f0c4a8" stroke-width="2"/>

  <!-- Latest value callout -->
  <rect x="470" y="68" width="55" height="20" rx="4" fill="#e8a87c"/>
  <text x="497" y="82" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">~950</text>

  <!-- Right side info panel -->
  <rect x="560" y="65" width="220" height="310" rx="12" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>

  <!-- Salary range -->
  <text x="670" y="92" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Salary Range</text>
  <text x="670" y="120" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="28" font-weight="800" text-anchor="middle">$90K</text>
  <text x="670" y="140" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">to</text>
  <text x="670" y="165" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="28" font-weight="800" text-anchor="middle">$350K+</text>
  <line x1="590" y1="182" x2="750" y2="182" stroke="#1a4a56" stroke-width="1"/>

  <!-- Demand badge -->
  <rect x="585" y="195" width="170" height="40" rx="8" fill="url(#demandBadge)" stroke="#e8a87c" stroke-width="1"/>
  <text x="670" y="213" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="13" font-weight="800" text-anchor="middle">3x More Demand</text>
  <text x="670" y="228" fill="#f0c4a8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">vs. 2024 baseline</text>

  <!-- Key stats -->
  <text x="670" y="260" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Where they work</text>
  <text x="590" y="282" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11">&#9679;</text>
  <text x="605" y="282" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">AI startups (38%)</text>
  <text x="590" y="302" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11">&#9679;</text>
  <text x="605" y="302" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Enterprise tech (29%)</text>
  <text x="590" y="322" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11">&#9679;</text>
  <text x="605" y="322" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Consulting (18%)</text>
  <text x="590" y="342" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11">&#9679;</text>
  <text x="605" y="342" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Freelance (15%)</text>

  <!-- Bottom note -->
  <text x="295" y="365" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Job postings indexed from LinkedIn, Indeed, and Glassdoor mentioning prompt engineering skills</text>
</svg>