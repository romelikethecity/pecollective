<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="rft-goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#f0c4a8"/>
    </linearGradient>
    <linearGradient id="rft-tealLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <linearGradient id="rft-goldArea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="rft-tealArea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d8a9a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3d8a9a" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">RAG vs Fine-Tuning: 12-Month Cost</text>
  <text x="400" y="52" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">Cumulative cost comparison over time</text>

  <!-- Legend -->
  <line x1="240" y1="68" x2="265" y2="68" stroke="#e8a87c" stroke-width="2.5"/>
  <circle cx="252" cy="68" r="3.5" fill="#e8a87c"/>
  <text x="272" y="72" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">RAG (ongoing: ~$350/mo)</text>
  <line x1="450" y1="68" x2="475" y2="68" stroke="#3d8a9a" stroke-width="2.5"/>
  <circle cx="462" cy="68" r="3.5" fill="#3d8a9a"/>
  <text x="482" y="72" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Fine-Tuning ($2,400 upfront + $50/mo)</text>

  <!-- Y-axis -->
  <line x1="100" y1="90" x2="100" y2="330" stroke="#1a4a56" stroke-width="1"/>
  <text x="55" y="96" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">$5,000</text>
  <line x1="95" y1="92" x2="760" y2="92" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="55" y="152" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">$4,000</text>
  <line x1="95" y1="148" x2="760" y2="148" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="55" y="208" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">$3,000</text>
  <line x1="95" y1="204" x2="760" y2="204" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="55" y="264" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">$2,000</text>
  <line x1="95" y1="260" x2="760" y2="260" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="55" y="320" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">$1,000</text>
  <line x1="95" y1="316" x2="760" y2="316" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- X-axis -->
  <line x1="100" y1="330" x2="760" y2="330" stroke="#1a4a56" stroke-width="1"/>

  <!-- X-axis labels (months) -->
  <text x="100" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">0</text>
  <text x="155" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">1</text>
  <text x="210" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">2</text>
  <text x="265" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">3</text>
  <text x="320" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">4</text>
  <text x="375" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">5</text>
  <text x="430" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">6</text>
  <text x="485" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">7</text>
  <text x="540" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">8</text>
  <text x="595" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">9</text>
  <text x="650" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">10</text>
  <text x="705" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">11</text>
  <text x="760" y="348" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">12</text>
  <text x="430" y="366" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">Months</text>

  <!-- RAG area fill: starts at $350/mo cumulative -->
  <!-- M0:330 M1:$350=313.4 M2:$700=296.8 M3:$1050=280.2 M4:$1400=263.6 M5:$1750=247 M6:$2100=230.4 M7:$2450=213.8 M8:$2800=197.2 M9:$3150=180.6 M10:$3500=164 M11:$3850=147.4 M12:$4200=130.8 -->
  <polygon points="100,330 155,313 210,297 265,280 320,264 375,247 430,230 485,214 540,197 595,181 650,164 705,147 760,131 760,330" fill="url(#rft-goldArea)"/>
  <!-- RAG line -->
  <polyline points="100,330 155,313 210,297 265,280 320,264 375,247 430,230 485,214 540,197 595,181 650,164 705,147 760,131" fill="none" stroke="#e8a87c" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- RAG dots -->
  <circle cx="100" cy="330" r="3" fill="#e8a87c"/>
  <circle cx="375" cy="247" r="3" fill="#e8a87c"/>
  <circle cx="760" cy="131" r="3" fill="#e8a87c"/>

  <!-- Fine-Tuning area: $2400 upfront, +$50/mo -->
  <!-- M0:$2400=216 M1:$2450=213.8 M2:$2500=211 M3:$2550=208.6 M4:$2600=206.2 M5:$2650=203.8 M6:$2700=201.4 M7:$2750=199 M8:$2800=197.2 M9:$2850=194.2 M10:$2900=192 M11:$2950=189.8 M12:$3000=187.6 -->
  <polygon points="100,216 155,214 210,211 265,209 320,206 375,204 430,201 485,199 540,197 595,194 650,192 705,190 760,188 760,330 100,330" fill="url(#rft-tealArea)"/>
  <!-- Fine-tuning line -->
  <polyline points="100,216 155,214 210,211 265,209 320,206 375,204 430,201 485,199 540,197 595,194 650,192 705,190 760,188" fill="none" stroke="#3d8a9a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- FT dots -->
  <circle cx="100" cy="216" r="3" fill="#3d8a9a"/>
  <circle cx="375" cy="204" r="3" fill="#3d8a9a"/>
  <circle cx="760" cy="188" r="3" fill="#3d8a9a"/>

  <!-- Crossover annotation at ~month 8 -->
  <line x1="540" y1="92" x2="540" y2="197" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <rect x="545" y="96" width="130" height="34" rx="6" fill="#132f38" stroke="#ffffff" stroke-width="0.5" opacity="0.95"/>
  <text x="610" y="112" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Break-even: ~8 months</text>
  <text x="610" y="125" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">FT cheaper after this point</text>

  <!-- End cost labels -->
  <text x="768" y="126" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="600">$4,200</text>
  <text x="768" y="184" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="600">$3,000</text>

  <!-- Bottom insight -->
  <text x="400" y="390" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">RAG is cheaper short-term; fine-tuning wins at scale beyond 8 months</text>
</svg>