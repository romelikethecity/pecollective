<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sal-jr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
    <linearGradient id="sal-mid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <linearGradient id="sal-sr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#f0c4a8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">MLOps Engineer Salary Ranges (2026)</text>
  <text x="400" y="62" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="12">United States, Full-Time</text>
  <!-- Scale markers -->
  <g transform="translate(200,80)">
    <text x="0" y="0" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">$100K</text>
    <text x="133" y="0" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">$150K</text>
    <text x="266" y="0" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">$200K</text>
    <text x="400" y="0" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">$250K</text>
    <text x="490" y="0" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">$280K</text>
    <!-- Grid lines -->
    <line x1="12" y1="8" x2="12" y2="210" stroke="#1a4a56" stroke-width="1" stroke-dasharray="3,4"/>
    <line x1="145" y1="8" x2="145" y2="210" stroke="#1a4a56" stroke-width="1" stroke-dasharray="3,4"/>
    <line x1="278" y1="8" x2="278" y2="210" stroke="#1a4a56" stroke-width="1" stroke-dasharray="3,4"/>
    <line x1="412" y1="8" x2="412" y2="210" stroke="#1a4a56" stroke-width="1" stroke-dasharray="3,4"/>
    <line x1="505" y1="8" x2="505" y2="210" stroke="#1a4a56" stroke-width="1" stroke-dasharray="3,4"/>
  </g>
  <!-- Junior bar -->
  <g transform="translate(0,100)">
    <text x="185" y="32" text-anchor="end" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Junior</text>
    <text x="185" y="50" text-anchor="end" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">0-2 years</text>
    <!-- Bar: $120K-$158K => starts at 53px, width ~101px on 0-280K scale -->
    <rect x="253" y="18" width="101" height="40" rx="6" fill="url(#sal-jr)"/>
    <text x="303" y="43" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">$120K - $158K</text>
  </g>
  <!-- Mid bar -->
  <g transform="translate(0,175)">
    <text x="185" y="32" text-anchor="end" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Mid-Level</text>
    <text x="185" y="50" text-anchor="end" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">2-5 years</text>
    <!-- Bar: $158K-$220K => starts at 154px, width ~165px -->
    <rect x="354" y="18" width="165" height="40" rx="6" fill="url(#sal-mid)"/>
    <text x="437" y="43" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">$158K - $220K</text>
  </g>
  <!-- Senior bar -->
  <g transform="translate(0,250)">
    <text x="185" y="32" text-anchor="end" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Senior</text>
    <text x="185" y="50" text-anchor="end" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">5+ years</text>
    <!-- Bar: $220K-$270K => starts at 320px, width ~133px -->
    <rect x="519" y="18" width="133" height="40" rx="6" fill="url(#sal-sr)"/>
    <text x="586" y="43" text-anchor="middle" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="13" font-weight="700">$220K - $270K</text>
  </g>
  <!-- Top employer callout -->
  <g transform="translate(480,330)">
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#132f38" stroke="#e8a87c" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="12" fill="#e8a87c" opacity="0.2"/>
    <text x="25" y="30" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="14">&#9733;</text>
    <text x="45" y="20" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Top Employers</text>
    <text x="45" y="38" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Google  |  Anyscale  |  Netflix</text>
  </g>
  <!-- Median indicator -->
  <g transform="translate(40,330)">
    <rect x="0" y="0" width="200" height="50" rx="10" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
    <text x="100" y="22" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">NATIONAL MEDIAN</text>
    <text x="100" y="42" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="800">$189,000</text>
  </g>
</svg>