<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Space Grotesk', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0f2d35"/>

  <!-- Title -->
  <text x="40" y="38" fill="#ffffff" font-size="20" font-weight="700">OpenAI API Pricing Per 1M Tokens</text>
  <text x="40" y="58" fill="#a8c5cc" font-size="12">Input vs output cost comparison across models</text>

  <!-- Legend -->
  <rect x="560" y="24" width="12" height="12" rx="2" fill="#e8a87c"/>
  <text x="578" y="35" fill="#a8c5cc" font-size="11">Input</text>
  <rect x="630" y="24" width="12" height="12" rx="2" fill="#3d8a9a"/>
  <text x="648" y="35" fill="#a8c5cc" font-size="11">Output</text>

  <!-- Grid lines -->
  <g stroke="#1a4a56" stroke-opacity="0.5" stroke-width="1">
    <line x1="200" y1="80" x2="200" y2="340"/>
    <line x1="320" y1="80" x2="320" y2="340"/>
    <line x1="440" y1="80" x2="440" y2="340"/>
    <line x1="560" y1="80" x2="560" y2="340"/>
    <line x1="680" y1="80" x2="680" y2="340"/>
  </g>

  <!-- Scale labels -->
  <text x="200" y="360" fill="#6a8a94" font-size="10" text-anchor="middle">$0</text>
  <text x="320" y="360" fill="#6a8a94" font-size="10" text-anchor="middle">$2.50</text>
  <text x="440" y="360" fill="#6a8a94" font-size="10" text-anchor="middle">$5.00</text>
  <text x="560" y="360" fill="#6a8a94" font-size="10" text-anchor="middle">$7.50</text>
  <text x="680" y="360" fill="#6a8a94" font-size="10" text-anchor="middle">$10.00</text>

  <!-- GPT-4.1 Nano -->
  <text x="190" y="108" fill="#ffffff" font-size="13" font-weight="600" text-anchor="end">GPT-4.1 Nano</text>
  <!-- Input: $0.10 => 4.8px -->
  <rect x="200" y="96" width="5" height="18" rx="2" fill="#e8a87c"/>
  <text x="210" y="109" fill="#a8c5cc" font-size="10">$0.10</text>
  <!-- Output: $0.40 => 19.2px -->
  <rect x="200" y="118" width="19" height="18" rx="2" fill="#3d8a9a"/>
  <text x="224" y="131" fill="#a8c5cc" font-size="10">$0.40</text>

  <!-- o4-mini -->
  <text x="190" y="178" fill="#ffffff" font-size="13" font-weight="600" text-anchor="end">o4-mini</text>
  <!-- Input: $1.10 => 52.8px -->
  <rect x="200" y="166" width="53" height="18" rx="2" fill="#e8a87c"/>
  <text x="258" y="179" fill="#a8c5cc" font-size="10">$1.10</text>
  <!-- Output: $4.40 => 211.2px -->
  <rect x="200" y="188" width="211" height="18" rx="2" fill="#3d8a9a"/>
  <text x="416" y="201" fill="#a8c5cc" font-size="10">$4.40</text>

  <!-- GPT-5 -->
  <text x="190" y="248" fill="#ffffff" font-size="13" font-weight="600" text-anchor="end">GPT-5</text>
  <!-- Input: $1.25 => 60px -->
  <rect x="200" y="236" width="60" height="18" rx="2" fill="#e8a87c"/>
  <text x="265" y="249" fill="#a8c5cc" font-size="10">$1.25</text>
  <!-- Output: $10.00 => 480px => cap at 480 -->
  <rect x="200" y="258" width="480" height="18" rx="2" fill="#3d8a9a"/>
  <text x="685" y="271" fill="#a8c5cc" font-size="10">$10.00</text>

  <!-- GPT-4.1 -->
  <text x="190" y="318" fill="#ffffff" font-size="13" font-weight="600" text-anchor="end">GPT-4.1</text>
  <!-- Input: $2.00 => 96px -->
  <rect x="200" y="306" width="96" height="18" rx="2" fill="#e8a87c"/>
  <text x="301" y="319" fill="#a8c5cc" font-size="10">$2.00</text>
  <!-- Output: $8.00 => 384px -->
  <rect x="200" y="328" width="384" height="18" rx="2" fill="#3d8a9a"/>
  <text x="589" y="341" fill="#a8c5cc" font-size="10">$8.00</text>

  <!-- Watermark -->
  <text x="780" y="390" fill="#6a8a94" font-size="10" text-anchor="end">PE Collective</text>
</svg>