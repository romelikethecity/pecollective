<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="cva-chromaBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#f0c4a8"/>
    </linearGradient>
    <linearGradient id="cva-pineconeBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <linearGradient id="cva-pgvBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">ChromaDB vs Pinecone vs pgvector</text>
  <text x="400" y="52" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">Feature comparison across key dimensions (1-10 scale)</text>

  <!-- Legend -->
  <rect x="180" y="64" width="12" height="12" rx="2" fill="#e8a87c"/>
  <text x="198" y="74" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Chroma</text>
  <rect x="295" y="64" width="12" height="12" rx="2" fill="#3d8a9a"/>
  <text x="313" y="74" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Pinecone</text>
  <rect x="420" y="64" width="12" height="12" rx="2" fill="#1a4a56" stroke="#2a6a7a" stroke-width="1"/>
  <text x="438" y="74" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">pgvector</text>

  <!-- Radar-style dot grid background -->
  <!-- Scale markers on right side -->
  <text x="760" y="130" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">10</text>
  <text x="760" y="185" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">7.5</text>
  <text x="760" y="240" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">5</text>
  <text x="760" y="295" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">2.5</text>

  <!-- Grid lines -->
  <line x1="160" y1="126" x2="750" y2="126" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="181" x2="750" y2="181" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="236" x2="750" y2="236" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="291" x2="750" y2="291" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="160" y1="346" x2="750" y2="346" stroke="#2a6a7a" stroke-width="1"/>

  <!-- Category 1: Setup Ease -->
  <text x="40" y="115" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Setup</text>
  <text x="40" y="132" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Ease</text>
  <!-- Chroma 9.5/10 -->
  <rect x="160" y="108" width="545" height="10" rx="3" fill="url(#cva-chromaBar)"/>
  <text x="715" y="118" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700">9.5</text>
  <!-- Pinecone 7/10 -->
  <rect x="160" y="122" width="400" height="10" rx="3" fill="url(#cva-pineconeBar)"/>
  <text x="570" y="132" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700">7.0</text>
  <!-- pgvector 5/10 -->
  <rect x="160" y="136" width="290" height="10" rx="3" fill="url(#cva-pgvBar)"/>
  <text x="460" y="146" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" font-weight="700">5.0</text>
  <!-- Winner badge -->
  <rect x="103" y="107" width="48" height="16" rx="8" fill="#e8a87c" opacity="0.2"/>
  <text x="127" y="118" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="8" font-weight="700">WINS</text>

  <!-- Category 2: Query Speed -->
  <text x="40" y="175" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Query</text>
  <text x="40" y="192" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Speed</text>
  <!-- Chroma 6/10 -->
  <rect x="160" y="168" width="345" height="10" rx="3" fill="url(#cva-chromaBar)"/>
  <text x="515" y="178" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700">6.0</text>
  <!-- Pinecone 9/10 -->
  <rect x="160" y="182" width="517" height="10" rx="3" fill="url(#cva-pineconeBar)"/>
  <text x="687" y="192" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700">9.0</text>
  <!-- pgvector 7.5/10 -->
  <rect x="160" y="196" width="430" height="10" rx="3" fill="url(#cva-pgvBar)"/>
  <text x="600" y="206" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" font-weight="700">7.5</text>

  <!-- Category 3: Scalability -->
  <text x="40" y="240" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Scale</text>
  <!-- Chroma 4/10 -->
  <rect x="160" y="228" width="230" height="10" rx="3" fill="url(#cva-chromaBar)"/>
  <text x="400" y="238" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700">4.0</text>
  <!-- Pinecone 9.5/10 -->
  <rect x="160" y="242" width="545" height="10" rx="3" fill="url(#cva-pineconeBar)"/>
  <text x="715" y="252" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700">9.5</text>
  <!-- pgvector 7/10 -->
  <rect x="160" y="256" width="400" height="10" rx="3" fill="url(#cva-pgvBar)"/>
  <text x="570" y="266" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" font-weight="700">7.0</text>

  <!-- Category 4: Cost -->
  <text x="40" y="300" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Cost</text>
  <!-- Chroma 9/10 (open source) -->
  <rect x="160" y="288" width="517" height="10" rx="3" fill="url(#cva-chromaBar)"/>
  <text x="687" y="298" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700">9.0</text>
  <!-- Pinecone 5/10 -->
  <rect x="160" y="302" width="290" height="10" rx="3" fill="url(#cva-pineconeBar)"/>
  <text x="460" y="312" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700">5.0</text>
  <!-- pgvector 8.5/10 -->
  <rect x="160" y="316" width="488" height="10" rx="3" fill="url(#cva-pgvBar)"/>
  <text x="658" y="326" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" font-weight="700">8.5</text>
  <rect x="103" y="287" width="48" height="16" rx="8" fill="#e8a87c" opacity="0.2"/>
  <text x="127" y="298" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="8" font-weight="700">WINS</text>

  <!-- Bottom verdict -->
  <rect x="40" y="355" width="225" height="35" rx="6" fill="#132f38" stroke="#e8a87c" stroke-width="1"/>
  <text x="152" y="372" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Chroma: Best for prototyping</text>
  <text x="152" y="385" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Open source, pip install</text>

  <rect x="285" y="355" width="225" height="35" rx="6" fill="#132f38" stroke="#3d8a9a" stroke-width="1"/>
  <text x="397" y="372" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Pinecone: Best at scale</text>
  <text x="397" y="385" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Managed, serverless</text>

  <rect x="530" y="355" width="230" height="35" rx="6" fill="#132f38" stroke="#2a6a7a" stroke-width="1"/>
  <text x="645" y="372" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" font-weight="700">pgvector: Best if on Postgres</text>
  <text x="645" y="385" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">No new infra needed</text>
</svg>