<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="pgv-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c4a8"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
    <linearGradient id="pgv-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d8a9a"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
    <filter id="pgv-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">pgvector: HNSW vs IVFFlat Query Speed</text>
  <text x="400" y="52" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">Average query latency in milliseconds (lower is better)</text>

  <!-- Legend -->
  <rect x="270" y="64" width="14" height="14" rx="3" fill="url(#pgv-gold)"/>
  <text x="290" y="75" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">HNSW (recommended)</text>
  <rect x="440" y="64" width="14" height="14" rx="3" fill="url(#pgv-teal)"/>
  <text x="460" y="75" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600">IVFFlat</text>

  <!-- Y-axis label -->
  <text x="25" y="220" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11" transform="rotate(-90, 25, 220)">Query Latency (ms)</text>

  <!-- Y-axis grid -->
  <text x="72" y="100" text-anchor="end" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">120ms</text>
  <line x1="78" y1="97" x2="750" y2="97" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="72" y="145" text-anchor="end" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">100ms</text>
  <line x1="78" y1="142" x2="750" y2="142" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="72" y="190" text-anchor="end" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">80ms</text>
  <line x1="78" y1="187" x2="750" y2="187" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="72" y="235" text-anchor="end" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">60ms</text>
  <line x1="78" y1="232" x2="750" y2="232" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="72" y="280" text-anchor="end" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">40ms</text>
  <line x1="78" y1="277" x2="750" y2="277" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="72" y="325" text-anchor="end" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">20ms</text>
  <line x1="78" y1="322" x2="750" y2="322" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Baseline -->
  <line x1="78" y1="340" x2="750" y2="340" stroke="#2a6a7a" stroke-width="1"/>

  <!-- 100K Vectors Group -->
  <text x="215" y="375" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">100K vectors</text>
  <!-- HNSW: 2ms -->
  <rect x="155" y="336" width="50" height="4" rx="2" fill="url(#pgv-gold)" filter="url(#pgv-glow)"/>
  <text x="180" y="332" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700">2ms</text>
  <!-- IVFFlat: 8ms -->
  <rect x="225" y="322" width="50" height="18" rx="2" fill="url(#pgv-teal)"/>
  <text x="250" y="318" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="700">8ms</text>

  <!-- 1M Vectors Group -->
  <text x="430" y="375" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">1M vectors</text>
  <!-- HNSW: 5ms -->
  <rect x="370" y="329" width="50" height="11" rx="2" fill="url(#pgv-gold)" filter="url(#pgv-glow)"/>
  <text x="395" y="325" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700">5ms</text>
  <!-- IVFFlat: 35ms -->
  <rect x="440" y="261" width="50" height="79" rx="2" fill="url(#pgv-teal)"/>
  <text x="465" y="257" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="700">35ms</text>

  <!-- 10M Vectors Group -->
  <text x="645" y="375" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">10M vectors</text>
  <!-- HNSW: 12ms -->
  <rect x="585" y="313" width="50" height="27" rx="2" fill="url(#pgv-gold)" filter="url(#pgv-glow)"/>
  <text x="610" y="309" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700">12ms</text>
  <!-- IVFFlat: 110ms -->
  <rect x="655" y="92" width="50" height="248" rx="2" fill="url(#pgv-teal)"/>
  <text x="680" y="88" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="700">110ms</text>

  <!-- Speed multiplier callouts -->
  <rect x="120" y="385" width="90" height="14" rx="3" fill="#e8a87c" opacity="0.15"/>
  <text x="165" y="395" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="9" font-weight="700">HNSW 4x faster</text>
  <rect x="336" y="385" width="90" height="14" rx="3" fill="#e8a87c" opacity="0.15"/>
  <text x="381" y="395" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="9" font-weight="700">HNSW 7x faster</text>
  <rect x="548" y="385" width="100" height="14" rx="3" fill="#e8a87c" opacity="0.15"/>
  <text x="598" y="395" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="9" font-weight="700">HNSW 9.2x faster</text>
</svg>