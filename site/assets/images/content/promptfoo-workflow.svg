<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="flowArrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3d8a9a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2a6a7a;stop-opacity:0.3"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3d8a9a"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>

  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Promptfoo Testing Workflow</text>

  <!-- Free + Open Source badge -->
  <rect x="305" y="40" width="190" height="22" rx="11" fill="#e8a87c" opacity="0.15" stroke="#e8a87c" stroke-width="1"/>
  <text x="400" y="55" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">FREE &amp; OPEN SOURCE (MIT License)</text>

  <!-- Step 1: Write YAML Config -->
  <rect x="30" y="85" width="140" height="130" rx="12" fill="#132f38" stroke="#e8a87c" stroke-width="2"/>
  <rect x="30" y="85" width="140" height="5" rx="3" fill="#e8a87c"/>
  <circle cx="100" cy="118" r="18" fill="#e8a87c" opacity="0.15"/>
  <text x="100" y="124" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">1</text>
  <text x="100" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Write YAML</text>
  <text x="100" y="163" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Config</text>
  <!-- Mini code preview -->
  <rect x="45" y="173" width="110" height="32" rx="4" fill="#0f2d35"/>
  <text x="52" y="186" fill="#3d8a9a" font-family="monospace" font-size="8">prompts:</text>
  <text x="52" y="198" fill="#6a8a94" font-family="monospace" font-size="8">  - "Translate {{text}}"</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="150" x2="195" y2="150" stroke="#3d8a9a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Define Test Cases -->
  <rect x="198" y="85" width="140" height="130" rx="12" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5"/>
  <rect x="198" y="85" width="140" height="5" rx="3" fill="#3d8a9a"/>
  <circle cx="268" cy="118" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="268" y="124" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">2</text>
  <text x="268" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Define Test</text>
  <text x="268" y="163" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Cases</text>
  <rect x="213" y="173" width="110" height="32" rx="4" fill="#0f2d35"/>
  <text x="220" y="186" fill="#3d8a9a" font-family="monospace" font-size="8">tests:</text>
  <text x="220" y="198" fill="#6a8a94" font-family="monospace" font-size="8">  - assert: contains</text>

  <!-- Arrow 2→3 -->
  <line x1="338" y1="150" x2="363" y2="150" stroke="#3d8a9a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Run Evals -->
  <rect x="366" y="85" width="140" height="130" rx="12" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5"/>
  <rect x="366" y="85" width="140" height="5" rx="3" fill="#3d8a9a"/>
  <circle cx="436" cy="118" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="436" y="124" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">3</text>
  <text x="436" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Run Evals</text>
  <!-- Model badges -->
  <rect x="384" y="163" width="50" height="16" rx="8" fill="#1a4a56"/>
  <text x="409" y="174" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">GPT-4o</text>
  <rect x="440" y="163" width="50" height="16" rx="8" fill="#1a4a56"/>
  <text x="465" y="174" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">Claude</text>
  <rect x="384" y="183" width="50" height="16" rx="8" fill="#1a4a56"/>
  <text x="409" y="194" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">Gemini</text>
  <rect x="440" y="183" width="50" height="16" rx="8" fill="#1a4a56"/>
  <text x="465" y="194" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">Llama</text>

  <!-- Arrow 3→4 -->
  <line x1="506" y1="150" x2="531" y2="150" stroke="#3d8a9a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Compare Results -->
  <rect x="534" y="85" width="140" height="130" rx="12" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5"/>
  <rect x="534" y="85" width="140" height="5" rx="3" fill="#3d8a9a"/>
  <circle cx="604" cy="118" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="604" y="124" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">4</text>
  <text x="604" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Compare</text>
  <text x="604" y="163" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Results</text>
  <!-- Mini table -->
  <rect x="549" y="173" width="110" height="32" rx="4" fill="#0f2d35"/>
  <text x="556" y="186" fill="#3d8a9a" font-family="monospace" font-size="8">GPT-4: 92% pass</text>
  <text x="556" y="198" fill="#e8a87c" font-family="monospace" font-size="8">Claude: 96% pass</text>

  <!-- Arrow 4→5 -->
  <line x1="674" y1="150" x2="699" y2="150" stroke="#3d8a9a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Catch Regressions -->
  <rect x="702" y="85" width="80" height="130" rx="12" fill="#132f38" stroke="#e8a87c" stroke-width="1.5"/>
  <rect x="702" y="85" width="80" height="5" rx="3" fill="#e8a87c"/>
  <circle cx="742" cy="118" r="18" fill="#e8a87c" opacity="0.15"/>
  <text x="742" y="124" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">5</text>
  <text x="742" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Catch</text>
  <text x="742" y="163" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Regressions</text>
  <text x="742" y="190" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">&#10004;</text>
  <text x="742" y="205" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">CI/CD ready</text>

  <!-- Bottom section: Key capabilities -->
  <line x1="30" y1="240" x2="770" y2="240" stroke="#1a4a56" stroke-width="1"/>
  <text x="400" y="265" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Key Capabilities</text>

  <!-- Capability cards -->
  <rect x="30" y="280" width="170" height="100" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="115" y="305" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">20+</text>
  <text x="115" y="322" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Assertion Types</text>
  <text x="115" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">contains, regex, similarity,</text>
  <text x="115" y="353" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">LLM-graded, JSON schema</text>

  <rect x="215" y="280" width="170" height="100" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="300" y="305" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">CLI</text>
  <text x="300" y="322" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Terminal-First</text>
  <text x="300" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">npx promptfoo eval</text>
  <text x="300" y="353" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Web UI for results</text>

  <rect x="400" y="280" width="170" height="100" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="485" y="305" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">10+</text>
  <text x="485" y="322" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Provider Support</text>
  <text x="485" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">OpenAI, Anthropic, Google,</text>
  <text x="485" y="353" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">local models, custom APIs</text>

  <rect x="585" y="280" width="185" height="100" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="677" y="305" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">Red Team</text>
  <text x="677" y="322" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Security Testing</text>
  <text x="677" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Jailbreak detection,</text>
  <text x="677" y="353" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">prompt injection, PII leaks</text>
</svg>