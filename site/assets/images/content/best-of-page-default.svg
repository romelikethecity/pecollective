<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Space Grotesk', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0f2d35"/>

  <!-- Title -->
  <text x="400" y="34" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Our Top Picks &amp; Rankings</text>
  <text x="400" y="52" fill="#a8c5cc" font-size="11" text-anchor="middle">Tested and ranked by the PE Collective team</text>

  <!-- Podium visual -->
  <!-- 2nd place -->
  <rect x="180" y="180" width="140" height="140" rx="6" fill="#132f38" stroke="#a8c5cc" stroke-width="1"/>
  <text x="250" y="210" fill="#a8c5cc" font-size="36" font-weight="700" text-anchor="middle">#2</text>
  <text x="250" y="234" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Runner Up</text>
  <line x1="200" y1="248" x2="300" y2="248" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="250" y="270" fill="#a8c5cc" font-size="10" text-anchor="middle">Strong performer</text>
  <text x="250" y="288" fill="#a8c5cc" font-size="10" text-anchor="middle">Close contender</text>
  <text x="250" y="306" fill="#6a8a94" font-size="10" text-anchor="middle">Great value</text>

  <!-- 1st place (taller) -->
  <rect x="330" y="100" width="140" height="220" rx="6" fill="#132f38" stroke="#e8a87c" stroke-width="2"/>
  <rect x="370" y="92" width="60" height="18" rx="9" fill="#e8a87c"/>
  <text x="400" y="105" fill="#0a1f25" font-size="9" font-weight="700" text-anchor="middle">WINNER</text>
  <text x="400" y="150" fill="#e8a87c" font-size="48" font-weight="700" text-anchor="middle">#1</text>
  <text x="400" y="178" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Top Pick</text>
  <line x1="350" y1="192" x2="450" y2="192" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="400" y="214" fill="#a8c5cc" font-size="10" text-anchor="middle">Best overall</text>
  <text x="400" y="232" fill="#a8c5cc" font-size="10" text-anchor="middle">Top performance</text>
  <text x="400" y="250" fill="#a8c5cc" font-size="10" text-anchor="middle">Best features</text>
  <text x="400" y="268" fill="#a8c5cc" font-size="10" text-anchor="middle">Recommended</text>
  <text x="400" y="306" fill="#e8a87c" font-size="11" font-weight="600" text-anchor="middle">Our Pick</text>

  <!-- 3rd place -->
  <rect x="480" y="210" width="140" height="110" rx="6" fill="#132f38" stroke="#3d8a9a" stroke-width="1"/>
  <text x="550" y="242" fill="#3d8a9a" font-size="36" font-weight="700" text-anchor="middle">#3</text>
  <text x="550" y="266" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Honorable</text>
  <line x1="500" y1="278" x2="600" y2="278" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="550" y="298" fill="#a8c5cc" font-size="10" text-anchor="middle">Worth considering</text>

  <!-- Additional picks indicator -->
  <g fill="#6a8a94" font-size="11">
    <text x="120" y="360" text-anchor="middle">#4</text>
    <text x="680" y="360" text-anchor="middle">#5</text>
  </g>
  <text x="120" y="376" fill="#a8c5cc" font-size="9" text-anchor="middle">Also tested</text>
  <text x="680" y="376" fill="#a8c5cc" font-size="9" text-anchor="middle">Also tested</text>

  <!-- Dots connecting -->
  <line x1="140" y1="350" x2="170" y2="320" stroke="#1a4a56" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="660" y1="350" x2="630" y2="320" stroke="#1a4a56" stroke-opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Watermark -->
  <text x="780" y="390" fill="#6a8a94" font-size="10" text-anchor="end">PE Collective</text>
</svg>