<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="lp-free" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#132f38"/>
    </linearGradient>
    <linearGradient id="lp-plus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#1a4a56"/>
    </linearGradient>
    <linearGradient id="lp-ent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#132f38"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="19" font-weight="700">LangSmith Pricing Tiers</text>
  <text x="400" y="55" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="11">by LangChain</text>
  <!-- Vertical card layout - 3 stacked cards -->
  <!-- Free Tier -->
  <g transform="translate(50,72)">
    <rect x="0" y="0" width="700" height="88" rx="12" fill="url(#lp-free)" stroke="#1a4a56" stroke-width="1.5"/>
    <!-- Tier label -->
    <rect x="20" y="15" width="65" height="24" rx="12" fill="#0f2d35" stroke="#3d8a9a" stroke-width="1"/>
    <text x="52" y="32" text-anchor="middle" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="11" font-weight="700">FREE</text>
    <!-- Price -->
    <text x="130" y="38" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="800">$0</text>
    <text x="175" y="38" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">/month</text>
    <!-- Features row -->
    <g transform="translate(260,10)">
      <rect x="0" y="0" width="120" height="65" rx="8" fill="#0f2d35"/>
      <text x="60" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">TRACES</text>
      <text x="60" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">5,000</text>
      <text x="60" y="62" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="9">per month</text>
    </g>
    <g transform="translate(400,10)">
      <rect x="0" y="0" width="120" height="65" rx="8" fill="#0f2d35"/>
      <text x="60" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">SEATS</text>
      <text x="60" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">1</text>
      <text x="60" y="62" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="9">user</text>
    </g>
    <g transform="translate(540,10)">
      <rect x="0" y="0" width="140" height="65" rx="8" fill="#0f2d35"/>
      <text x="70" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">INCLUDES</text>
      <text x="70" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10">Tracing, playground</text>
      <text x="70" y="56" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10">basic evaluations</text>
    </g>
  </g>
  <!-- Plus Tier -->
  <g transform="translate(50,175)">
    <rect x="0" y="0" width="700" height="88" rx="12" fill="url(#lp-plus)" stroke="#3d8a9a" stroke-width="2"/>
    <!-- Popular badge -->
    <rect x="590" y="-12" width="90" height="24" rx="12" fill="#3d8a9a"/>
    <text x="635" y="3" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">POPULAR</text>
    <!-- Tier label -->
    <rect x="20" y="15" width="65" height="24" rx="12" fill="#0f2d35" stroke="#3d8a9a" stroke-width="1"/>
    <text x="52" y="32" text-anchor="middle" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="11" font-weight="700">PLUS</text>
    <!-- Price -->
    <text x="130" y="38" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="800">$39</text>
    <text x="185" y="38" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">/seat/mo</text>
    <!-- Features row -->
    <g transform="translate(260,10)">
      <rect x="0" y="0" width="120" height="65" rx="8" fill="#0f2d35"/>
      <text x="60" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">TRACES</text>
      <text x="60" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">10,000</text>
      <text x="60" y="62" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="9">per month</text>
    </g>
    <g transform="translate(400,10)">
      <rect x="0" y="0" width="120" height="65" rx="8" fill="#0f2d35"/>
      <text x="60" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">SEATS</text>
      <text x="60" y="48" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">5+</text>
      <text x="60" y="62" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="9">team members</text>
    </g>
    <g transform="translate(540,10)">
      <rect x="0" y="0" width="140" height="65" rx="8" fill="#0f2d35"/>
      <text x="70" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">INCLUDES</text>
      <text x="70" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10">+ Automations</text>
      <text x="70" y="56" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10">+ Advanced evals</text>
    </g>
  </g>
  <!-- Enterprise Tier -->
  <g transform="translate(50,278)">
    <rect x="0" y="0" width="700" height="88" rx="12" fill="url(#lp-ent)" stroke="#e8a87c" stroke-width="2"/>
    <!-- Tier label -->
    <rect x="20" y="15" width="100" height="24" rx="12" fill="#0f2d35" stroke="#e8a87c" stroke-width="1"/>
    <text x="70" y="32" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="11" font-weight="700">ENTERPRISE</text>
    <!-- Price -->
    <text x="165" y="38" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="28" font-weight="800">Custom</text>
    <!-- Features row -->
    <g transform="translate(260,10)">
      <rect x="0" y="0" width="120" height="65" rx="8" fill="#0f2d35"/>
      <text x="60" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">TRACES</text>
      <text x="60" y="48" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Unlimited</text>
    </g>
    <g transform="translate(400,10)">
      <rect x="0" y="0" width="120" height="65" rx="8" fill="#0f2d35"/>
      <text x="60" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">SEATS</text>
      <text x="60" y="48" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Unlimited</text>
    </g>
    <g transform="translate(540,10)">
      <rect x="0" y="0" width="140" height="65" rx="8" fill="#0f2d35"/>
      <text x="70" y="22" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">INCLUDES</text>
      <text x="70" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10">+ SSO, RBAC</text>
      <text x="70" y="56" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10">+ SLA, self-hosted</text>
    </g>
  </g>
  <!-- Footer note -->
  <text x="400" y="390" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="10">All tiers include LangSmith tracing, prompt playground, and dataset management</text>
</svg>