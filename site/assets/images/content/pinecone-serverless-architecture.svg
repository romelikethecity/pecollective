<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="psa-nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#132f38"/>
    </linearGradient>
    <linearGradient id="psa-goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="psa-arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d8a9a"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
    <marker id="psa-arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e8a87c"/>
    </marker>
    <marker id="psa-arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d8a9a"/>
    </marker>
    <filter id="psa-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">Pinecone Serverless Architecture</text>
  <text x="400" y="52" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">How serverless vector search works under the hood</text>

  <!-- Step 1: Data Ingestion -->
  <rect x="30" y="80" width="150" height="120" rx="10" fill="url(#psa-nodeGrad)" stroke="#3d8a9a" stroke-width="1.5"/>
  <!-- Icon: upload arrow -->
  <line x1="105" y1="118" x2="105" y2="96" stroke="#3d8a9a" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="95,106 105,96 115,106" fill="none" stroke="#3d8a9a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="105" y="140" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Ingest</text>
  <text x="105" y="156" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Vectors + metadata</text>
  <text x="105" y="170" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Upsert API</text>
  <!-- Step number -->
  <circle cx="50" cy="88" r="10" fill="#3d8a9a"/>
  <text x="50" y="92" text-anchor="middle" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="800">1</text>

  <!-- Arrow 1→2 -->
  <line x1="185" y1="140" x2="230" y2="140" stroke="#3d8a9a" stroke-width="2" marker-end="url(#psa-arrowTeal)"/>

  <!-- Step 2: Serverless Index -->
  <rect x="238" y="75" width="195" height="130" rx="10" fill="url(#psa-nodeGrad)" stroke="#e8a87c" stroke-width="1.5"/>
  <!-- Serverless scaling icon -->
  <rect x="290" y="92" width="40" height="6" rx="3" fill="#e8a87c" opacity="0.6"/>
  <rect x="280" y="102" width="60" height="6" rx="3" fill="#e8a87c" opacity="0.8"/>
  <rect x="270" y="112" width="80" height="6" rx="3" fill="#e8a87c"/>
  <text x="335" y="140" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Serverless Index</text>
  <text x="335" y="156" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Auto-scaling</text>
  <text x="335" y="170" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">No pod management</text>
  <text x="335" y="183" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Scales to zero when idle</text>
  <circle cx="258" cy="83" r="10" fill="#e8a87c"/>
  <text x="258" y="87" text-anchor="middle" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="800">2</text>

  <!-- Arrow 2→3 -->
  <line x1="438" y1="140" x2="483" y2="140" stroke="url(#psa-arrowGrad)" stroke-width="2" marker-end="url(#psa-arrowHead)"/>

  <!-- Step 3: Query API -->
  <rect x="491" y="80" width="150" height="120" rx="10" fill="url(#psa-nodeGrad)" stroke="#3d8a9a" stroke-width="1.5"/>
  <!-- Search icon -->
  <circle cx="566" cy="104" r="12" fill="none" stroke="#3d8a9a" stroke-width="2"/>
  <line x1="574" y1="113" x2="582" y2="121" stroke="#3d8a9a" stroke-width="2" stroke-linecap="round"/>
  <text x="566" y="140" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Query API</text>
  <text x="566" y="156" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Similarity search</text>
  <text x="566" y="170" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Top-K + filters</text>
  <circle cx="511" cy="88" r="10" fill="#3d8a9a"/>
  <text x="511" y="92" text-anchor="middle" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="800">3</text>

  <!-- Arrow 3→4 -->
  <line x1="646" y1="140" x2="691" y2="140" stroke="#3d8a9a" stroke-width="2" marker-end="url(#psa-arrowTeal)"/>

  <!-- Step 4: Results -->
  <rect x="699" y="80" width="80" height="120" rx="10" fill="url(#psa-nodeGrad)" stroke="#3d8a9a" stroke-width="1.5"/>
  <!-- Results icon: stacked lines -->
  <rect x="716" y="100" width="46" height="4" rx="2" fill="#3d8a9a"/>
  <rect x="716" y="110" width="36" height="4" rx="2" fill="#3d8a9a" opacity="0.7"/>
  <rect x="716" y="120" width="26" height="4" rx="2" fill="#3d8a9a" opacity="0.4"/>
  <text x="739" y="146" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Results</text>
  <text x="739" y="162" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9">Ranked</text>
  <text x="739" y="174" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="9">matches</text>
  <circle cx="719" cy="88" r="10" fill="#3d8a9a"/>
  <text x="719" y="92" text-anchor="middle" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="800">4</text>

  <!-- Key Benefits Section -->
  <text x="400" y="240" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Serverless Advantages</text>

  <!-- Benefit cards -->
  <rect x="40" y="258" width="170" height="65" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="125" y="280" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="22" font-weight="800">$0</text>
  <text x="125" y="296" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Idle cost</text>
  <text x="125" y="312" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Scales to zero</text>

  <rect x="230" y="258" width="170" height="65" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="315" y="278" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="16" font-weight="800">$0.0000025</text>
  <text x="315" y="296" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Per read unit</text>
  <text x="315" y="312" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Pay only for queries</text>

  <rect x="420" y="258" width="170" height="65" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="505" y="280" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="22" font-weight="800">&lt;50ms</text>
  <text x="505" y="296" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">p50 latency</text>
  <text x="505" y="312" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">At any scale</text>

  <rect x="610" y="258" width="150" height="65" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="685" y="280" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="20" font-weight="800">100B+</text>
  <text x="685" y="296" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Vector capacity</text>
  <text x="685" y="312" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">No infra limits</text>

  <!-- vs Pods comparison -->
  <rect x="40" y="340" width="720" height="46" rx="8" fill="#132f38" stroke="#e8a87c" stroke-width="1" opacity="0.9"/>
  <text x="60" y="362" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700">vs Pod-based:</text>
  <text x="160" y="362" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Serverless is up to 50x cheaper for spiky workloads.</text>
  <text x="160" y="378" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">No pod sizing, no replicas, no storage provisioning. Start at $0 and scale automatically.</text>
</svg>