    <text x="486" y="34" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10" font-weight="700">76%</text>
    <rect x="625" y="14" width="100" height="30" rx="6" fill="#0f2d35" stroke="#1a4a56" stroke-width="1"/>
    <text x="675" y="34" text-anchor="middle" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="14" font-weight="700">$25/mo</text>
  </g>
  <!-- #5 Zed -->
  <g transform="translate(30,335)">
    <rect x="0" y="0" width="740" height="58" rx="10" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
    <rect x="10" y="10" width="38" height="38" rx="19" fill="#1a4a56"/>
    <text x="29" y="36" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="18" font-weight="900">5</text>
    <text x="65" y="30" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="800">Zed</text>
    <text x="65" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">&#9733;&#9733;&#9733;</text>
    <text x="101" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">&#9734;&#9734;</text>
    <text x="130" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12" font-weight="700">3.5/5</text>
    <rect x="200" y="18" width="400" height="22" rx="4" fill="#0f2d35"/>
    <rect x="200" y="18" width="280" height="22" rx="4" fill="url(#rank-4)"/>
    <text x="462" y="34" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10" font-weight="700">70%</text>
    <rect x="625" y="14" width="100" height="30" rx="6" fill="#0f2d35" stroke="#1a4a56" stroke-width="1"/>
    <text x="675" y="34" text-anchor="middle" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Free</text>
