<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Space Grotesk', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0f2d35"/>

  <!-- Title -->
  <text x="40" y="36" fill="#ffffff" font-size="18" font-weight="700">Embedding Model Benchmarks &amp; Pricing</text>
  <text x="40" y="54" fill="#a8c5cc" font-size="11">MTEB retrieval scores with cost per 1M tokens (April 2026)</text>

  <!-- Legend -->
  <rect x="530" y="22" width="12" height="12" rx="2" fill="#e8a87c"/>
  <text x="548" y="33" fill="#a8c5cc" font-size="11">MTEB Score</text>
  <rect x="640" y="22" width="12" height="12" rx="2" fill="#3d8a9a"/>
  <text x="658" y="33" fill="#a8c5cc" font-size="11">Price</text>

  <!-- Y axis: Models -->
  <!-- X axis: MTEB score 50-70 mapped over 420px (280-700). 21px per point -->

  <!-- Grid lines -->
  <g stroke="#1a4a56" stroke-opacity="0.5" stroke-width="1">
    <line x1="280" y1="70" x2="280" y2="310"/>
    <line x1="385" y1="70" x2="385" y2="310"/>
    <line x1="490" y1="70" x2="490" y2="310"/>
    <line x1="595" y1="70" x2="595" y2="310"/>
    <line x1="700" y1="70" x2="700" y2="310"/>
  </g>

  <!-- Scale labels -->
  <text x="280" y="328" fill="#6a8a94" font-size="10" text-anchor="middle">50</text>
  <text x="385" y="328" fill="#6a8a94" font-size="10" text-anchor="middle">55</text>
  <text x="490" y="328" fill="#6a8a94" font-size="10" text-anchor="middle">60</text>
  <text x="595" y="328" fill="#6a8a94" font-size="10" text-anchor="middle">65</text>
  <text x="700" y="328" fill="#6a8a94" font-size="10" text-anchor="middle">70</text>
  <text x="490" y="342" fill="#6a8a94" font-size="10" text-anchor="middle">MTEB Retrieval Score</text>

  <!-- text-embedding-3-large: MTEB ~64.6, $0.13/1M -->
  <text x="270" y="93" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">text-embedding-3-large</text>
  <text x="270" y="106" fill="#6a8a94" font-size="10" text-anchor="end">OpenAI | $0.13/1M</text>
  <rect x="280" y="82" width="307" height="14" rx="2" fill="#e8a87c"/>
  <text x="592" y="93" fill="#ffffff" font-size="10" font-weight="600">64.6</text>

  <!-- Cohere embed-v4: MTEB ~63.8, $0.10/1M -->
  <text x="270" y="143" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">embed-v4</text>
  <text x="270" y="156" fill="#6a8a94" font-size="10" text-anchor="end">Cohere | $0.10/1M</text>
  <rect x="280" y="132" width="290" height="14" rx="2" fill="#3d8a9a"/>
  <text x="575" y="143" fill="#ffffff" font-size="10" font-weight="600">63.8</text>

  <!-- Voyage-3-large: MTEB ~66.3, $0.18/1M -->
  <text x="270" y="193" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">voyage-3-large</text>
  <text x="270" y="206" fill="#6a8a94" font-size="10" text-anchor="end">Voyage AI | $0.18/1M</text>
  <rect x="280" y="182" width="343" height="14" rx="2" fill="#e8a87c"/>
  <text x="628" y="193" fill="#ffffff" font-size="10" font-weight="600">66.3</text>

  <!-- BGE-M3: MTEB ~62.4, Free -->
  <text x="270" y="243" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">BGE-M3</text>
  <text x="270" y="256" fill="#6a8a94" font-size="10" text-anchor="end">BAAI | Free (self-hosted)</text>
  <rect x="280" y="232" width="261" height="14" rx="2" fill="#3d8a9a"/>
  <text x="546" y="243" fill="#ffffff" font-size="10" font-weight="600">62.4</text>

  <!-- Jina v3: MTEB ~65.5, $0.02/1M -->
  <text x="270" y="293" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Jina v3</text>
  <text x="270" y="306" fill="#6a8a94" font-size="10" text-anchor="end">Jina AI | $0.02/1M</text>
  <rect x="280" y="282" width="326" height="14" rx="2" fill="#e8a87c"/>
  <text x="611" y="293" fill="#ffffff" font-size="10" font-weight="600">65.5</text>

  <!-- Cost efficiency highlight -->
  <rect x="40" y="356" width="720" height="28" rx="6" fill="#132f38"/>
  <text x="400" y="374" fill="#a8c5cc" font-size="11" text-anchor="middle">Best value: Jina v3 ($0.02/1M) scores 65.5 | Best score: voyage-3-large (66.3) at $0.18/1M</text>

  <!-- Watermark -->
  <text x="780" y="390" fill="#6a8a94" font-size="10" text-anchor="end">PE Collective</text>
</svg>