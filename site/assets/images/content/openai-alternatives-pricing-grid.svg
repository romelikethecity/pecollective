<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Space Grotesk', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0f2d35"/>

  <!-- Title -->
  <text x="400" y="34" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">OpenAI Alternatives: Price Per 1M Input Tokens</text>
  <text x="400" y="52" fill="#a8c5cc" font-size="11" text-anchor="middle">Cheapest capable model from each provider vs GPT-4.1 ($2.00)</text>

  <!-- Reference line for GPT-4.1 at $2.00 -->
  <!-- Scale: 0-$3 over 500px (240-740). ~166.7px per $1 -->

  <!-- Grid -->
  <g stroke="#1a4a56" stroke-opacity="0.5" stroke-width="1">
    <line x1="240" y1="68" x2="240" y2="340"/>
    <line x1="407" y1="68" x2="407" y2="340"/>
    <line x1="573" y1="68" x2="573" y2="340"/>
    <line x1="740" y1="68" x2="740" y2="340"/>
  </g>

  <!-- Scale -->
  <text x="240" y="358" fill="#6a8a94" font-size="10" text-anchor="middle">$0</text>
  <text x="407" y="358" fill="#6a8a94" font-size="10" text-anchor="middle">$1.00</text>
  <text x="573" y="358" fill="#6a8a94" font-size="10" text-anchor="middle">$2.00</text>
  <text x="740" y="358" fill="#6a8a94" font-size="10" text-anchor="middle">$3.00</text>

  <!-- GPT-4.1 reference dashed line -->
  <line x1="573" y1="68" x2="573" y2="340" stroke="#e8a87c" stroke-width="2" stroke-dasharray="6,4" stroke-opacity="0.6"/>
  <text x="573" y="64" fill="#e8a87c" font-size="10" text-anchor="middle">GPT-4.1 ($2.00)</text>

  <!-- Gemini Flash: $0.075 => 12.5px -->
  <text x="230" y="92" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Gemini Flash</text>
  <rect x="240" y="80" width="13" height="20" rx="3" fill="#3d8a9a"/>
  <text x="258" y="94" fill="#a8c5cc" font-size="11">$0.075</text>
  <text x="340" y="94" fill="#4ade80" font-size="10" font-weight="600">96% cheaper</text>

  <!-- Mistral Small: $0.10 => 16.7px -->
  <text x="230" y="132" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Mistral Small</text>
  <rect x="240" y="120" width="17" height="20" rx="3" fill="#e8a87c"/>
  <text x="262" y="134" fill="#a8c5cc" font-size="11">$0.10</text>
  <text x="340" y="134" fill="#4ade80" font-size="10" font-weight="600">95% cheaper</text>

  <!-- Claude Haiku 4.5: $1.00 => 167px -->
  <text x="230" y="172" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Claude Haiku 4.5</text>
  <rect x="240" y="160" width="167" height="20" rx="3" fill="#3d8a9a"/>
  <text x="412" y="174" fill="#a8c5cc" font-size="11">$1.00</text>
  <text x="485" y="174" fill="#4ade80" font-size="10" font-weight="600">50% cheaper</text>

  <!-- Gemini Pro: $1.25 => 208px -->
  <text x="230" y="212" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Gemini Pro</text>
  <rect x="240" y="200" width="208" height="20" rx="3" fill="#e8a87c"/>
  <text x="453" y="214" fill="#a8c5cc" font-size="11">$1.25</text>
  <text x="525" y="214" fill="#4ade80" font-size="10" font-weight="600">38% cheaper</text>

  <!-- Cohere Command R+: $2.50 => 417px -->
  <text x="230" y="252" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Cohere Cmd R+</text>
  <rect x="240" y="240" width="417" height="20" rx="3" fill="#3d8a9a"/>
  <text x="662" y="254" fill="#a8c5cc" font-size="11">$2.50</text>

  <!-- Claude Sonnet 4.6: $3.00 => 500px -->
  <text x="230" y="292" fill="#ffffff" font-size="12" font-weight="600" text-anchor="end">Claude Sonnet 4.6</text>
  <rect x="240" y="280" width="500" height="20" rx="3" fill="#e8a87c"/>
  <text x="745" y="294" fill="#a8c5cc" font-size="11">$3.00</text>

  <!-- Footer -->
  <rect x="40" y="345" width="720" height="26" rx="6" fill="#132f38"/>
  <text x="400" y="362" fill="#a8c5cc" font-size="11" text-anchor="middle">Open-source models (Llama 4, Qwen) available from $0.05/1M via hosted providers</text>

  <!-- Watermark -->
  <text x="780" y="390" fill="#6a8a94" font-size="10" text-anchor="end">PE Collective</text>
</svg>