<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a56;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#132f38;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>

  <!-- Title -->
  <text x="400" y="32" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Gemini Alternatives Comparison Grid</text>
  <text x="400" y="50" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Each alternative excels in a different use case</text>

  <!-- Row 1 -->
  <!-- Claude -->
  <rect x="20" y="65" width="245" height="150" rx="10" fill="url(#cardBg)" stroke="#e8a87c" stroke-width="1.5"/>
  <circle cx="55" cy="97" r="18" fill="#e8a87c" opacity="0.15"/>
  <text x="55" y="103" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">C</text>
  <text x="82" y="95" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Claude</text>
  <text x="82" y="110" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Anthropic</text>
  <rect x="35" y="122" width="215" height="22" rx="4" fill="#e8a87c" opacity="0.12"/>
  <text x="142" y="137" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Best instruction following</text>
  <text x="35" y="162" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">200K context window, agentic coding,</text>
  <text x="35" y="175" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">careful + nuanced reasoning</text>
  <text x="35" y="200" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">$20/mo</text>
  <text x="105" y="200" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Pro plan</text>

  <!-- GPT-4 -->
  <rect x="278" y="65" width="245" height="150" rx="10" fill="url(#cardBg)" stroke="#2a6a7a" stroke-width="1.5"/>
  <circle cx="313" cy="97" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="313" y="103" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">G</text>
  <text x="340" y="95" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">GPT-4o</text>
  <text x="340" y="110" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">OpenAI</text>
  <rect x="293" y="122" width="215" height="22" rx="4" fill="#3d8a9a" opacity="0.15"/>
  <text x="400" y="137" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Largest plugin ecosystem</text>
  <text x="293" y="162" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">GPTs marketplace, DALL-E, browsing,</text>
  <text x="293" y="175" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">code interpreter, file analysis</text>
  <text x="293" y="200" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">$20/mo</text>
  <text x="363" y="200" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Plus plan</text>

  <!-- Perplexity -->
  <rect x="536" y="65" width="245" height="150" rx="10" fill="url(#cardBg)" stroke="#2a6a7a" stroke-width="1.5"/>
  <circle cx="571" cy="97" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="571" y="103" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">P</text>
  <text x="598" y="95" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Perplexity</text>
  <text x="598" y="110" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Perplexity AI</text>
  <rect x="551" y="122" width="215" height="22" rx="4" fill="#3d8a9a" opacity="0.15"/>
  <text x="658" y="137" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Best for research</text>
  <text x="551" y="162" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Real-time web search, cited sources,</text>
  <text x="551" y="175" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">academic papers, fact-checked answers</text>
  <text x="551" y="200" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">$20/mo</text>
  <text x="621" y="200" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Pro plan</text>

  <!-- Row 2 -->
  <!-- Mistral -->
  <rect x="20" y="230" width="245" height="150" rx="10" fill="url(#cardBg)" stroke="#2a6a7a" stroke-width="1.5"/>
  <circle cx="55" cy="262" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="55" y="268" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">M</text>
  <text x="82" y="260" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Mistral</text>
  <text x="82" y="275" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Mistral AI</text>
  <rect x="35" y="287" width="215" height="22" rx="4" fill="#3d8a9a" opacity="0.15"/>
  <text x="142" y="302" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Top open-source option</text>
  <text x="35" y="327" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Open weights, self-hostable, strong</text>
  <text x="35" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">multilingual, EU data sovereignty</text>
  <text x="35" y="365" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Free</text>
  <text x="63" y="365" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Le Chat / API pay-per-use</text>

  <!-- Llama -->
  <rect x="278" y="230" width="245" height="150" rx="10" fill="url(#cardBg)" stroke="#2a6a7a" stroke-width="1.5"/>
  <circle cx="313" cy="262" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="313" y="268" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">L</text>
  <text x="340" y="260" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Llama 4</text>
  <text x="340" y="275" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Meta</text>
  <rect x="293" y="287" width="215" height="22" rx="4" fill="#3d8a9a" opacity="0.15"/>
  <text x="400" y="302" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Best for self-hosting</text>
  <text x="293" y="327" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Run locally with Ollama, fine-tunable,</text>
  <text x="293" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">no data leaves your servers</text>
  <text x="293" y="365" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Free</text>
  <text x="321" y="365" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Open source / compute costs</text>

  <!-- Cohere -->
  <rect x="536" y="230" width="245" height="150" rx="10" fill="url(#cardBg)" stroke="#2a6a7a" stroke-width="1.5"/>
  <circle cx="571" cy="262" r="18" fill="#3d8a9a" opacity="0.15"/>
  <text x="571" y="268" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">Co</text>
  <text x="598" y="260" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Cohere</text>
  <text x="598" y="275" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Cohere Inc.</text>
  <rect x="551" y="287" width="215" height="22" rx="4" fill="#3d8a9a" opacity="0.15"/>
  <text x="658" y="302" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Best for enterprise RAG</text>
  <text x="551" y="327" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Enterprise-grade RAG, private deploy,</text>
  <text x="551" y="340" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">best-in-class embeddings</text>
  <text x="551" y="365" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Custom</text>
  <text x="601" y="365" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Enterprise pricing</text>
</svg>