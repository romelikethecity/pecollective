<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="wp-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="wp-free" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#132f38"/>
    </linearGradient>
    <linearGradient id="wp-flex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#1a4a56"/>
    </linearGradient>
    <linearGradient id="wp-plus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#c47850"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Weaviate Pricing Tiers</text>
  <text x="400" y="50" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Vector database hosting options for every stage</text>

  <!-- 3 tier cards as elevated panels -->

  <!-- Tier 1: Sandbox (Free) -->
  <rect x="30" y="70" width="230" height="230" rx="14" fill="url(#wp-free)" stroke="#2a6a7a" stroke-width="1" filter="url(#wp-shadow)"/>

  <!-- Free badge -->
  <rect x="105" y="82" width="80" height="26" rx="13" fill="#2a6a7a" opacity="0.3"/>
  <text x="145" y="100" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">FREE</text>

  <text x="145" y="128" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Sandbox</text>

  <text x="145" y="150" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="28" font-weight="700" text-anchor="middle">$0</text>
  <text x="145" y="166" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">forever free</text>

  <line x1="55" y1="176" x2="235" y2="176" stroke="#2a6a7a" stroke-width="0.5"/>

  <!-- Features -->
  <circle cx="60" cy="196" r="3" fill="#3d8a9a"/>
  <text x="72" y="200" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">50K vector objects</text>

  <circle cx="60" cy="218" r="3" fill="#3d8a9a"/>
  <text x="72" y="222" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">14-day data retention</text>

  <circle cx="60" cy="240" r="3" fill="#3d8a9a"/>
  <text x="72" y="244" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Single cluster</text>

  <circle cx="60" cy="262" r="3" fill="#3d8a9a"/>
  <text x="72" y="266" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Community support</text>

  <text x="145" y="290" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Best for: Prototyping</text>

  <!-- Tier 2: Cloud Flex -->
  <rect x="285" y="70" width="230" height="230" rx="14" fill="url(#wp-flex)" stroke="#3d8a9a" stroke-width="1.5" filter="url(#wp-shadow)"/>

  <text x="400" y="98" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Cloud Flex</text>

  <text x="370" y="130" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="28" font-weight="700" text-anchor="end">$45</text>
  <text x="374" y="130" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="13">/mo</text>
  <text x="400" y="148" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">pay-as-you-go</text>

  <line x1="310" y1="158" x2="490" y2="158" stroke="#3d8a9a" stroke-width="0.5"/>

  <circle cx="315" cy="178" r="3" fill="#3d8a9a"/>
  <text x="327" y="182" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Unlimited objects</text>

  <circle cx="315" cy="200" r="3" fill="#3d8a9a"/>
  <text x="327" y="204" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Auto-scaling</text>

  <circle cx="315" cy="222" r="3" fill="#3d8a9a"/>
  <text x="327" y="226" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Standard support</text>

  <circle cx="315" cy="244" r="3" fill="#3d8a9a"/>
  <text x="327" y="248" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Monitoring dashboard</text>

  <text x="400" y="280" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Best for: Early-stage apps</text>

  <!-- Tier 3: Cloud Plus (highlighted) -->
  <rect x="540" y="60" width="230" height="250" rx="14" fill="url(#wp-plus)" filter="url(#wp-shadow)"/>

  <!-- Popular badge -->
  <rect x="596" y="70" width="118" height="22" rx="11" fill="#0f2d35" opacity="0.3"/>
  <text x="655" y="85" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">MOST POPULAR</text>

  <text x="655" y="112" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Cloud Plus</text>

  <text x="620" y="144" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" text-anchor="end">$280</text>
  <text x="624" y="144" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="13" opacity="0.7">/mo</text>
  <text x="655" y="160" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.7">production SLA</text>

  <line x1="565" y1="170" x2="745" y2="170" stroke="#0f2d35" stroke-width="0.5" opacity="0.3"/>

  <circle cx="570" cy="190" r="3" fill="#0f2d35"/>
  <text x="582" y="194" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="11" font-weight="500">99.9% uptime SLA</text>

  <circle cx="570" cy="212" r="3" fill="#0f2d35"/>
  <text x="582" y="216" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Multi-tenant isolation</text>

  <circle cx="570" cy="234" r="3" fill="#0f2d35"/>
  <text x="582" y="238" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Priority support</text>

  <circle cx="570" cy="256" r="3" fill="#0f2d35"/>
  <text x="582" y="260" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="11" font-weight="500">RBAC + encryption</text>

  <text x="655" y="296" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle" opacity="0.7">Best for: Production workloads</text>

  <!-- Self-hosted alternative path at bottom -->
  <rect x="30" y="325" width="740" height="60" rx="10" fill="#132f38" stroke="#1a4a56" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- Path indicator -->
  <text x="55" y="350" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" font-weight="700">ALTERNATIVE</text>

  <rect x="140" y="336" width="120" height="30" rx="8" fill="#1a4a56"/>
  <text x="200" y="356" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Self-Hosted</text>

  <text x="280" y="350" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">Free + open source</text>
  <text x="280" y="368" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">BYO compute (Docker / Kubernetes)</text>

  <!-- Arrow indicators -->
  <text x="570" y="346" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">Full feature parity</text>
  <text x="570" y="362" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10">You manage infrastructure</text>
  <text x="570" y="378" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Best for: Cost-sensitive at scale</text>
</svg>