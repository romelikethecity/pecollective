<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="ld-lc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8a9a"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
    <linearGradient id="ld-li" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#c47850"/>
    </linearGradient>
    <filter id="ld-s">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">LangChain vs LlamaIndex: Detailed Comparison</text>

  <!-- Legend -->
  <rect x="275" y="40" width="14" height="14" rx="3" fill="#3d8a9a"/>
  <text x="295" y="52" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LangChain</text>
  <rect x="405" y="40" width="14" height="14" rx="3" fill="#e8a87c"/>
  <text x="425" y="52" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LlamaIndex</text>

  <!-- Dimension headers - 5 radar-style rows -->
  <!-- Each dimension: label on left, two horizontal bars, scores on edges -->

  <!-- Scale reference -->
  <text x="270" y="80" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="end">0</text>
  <text x="400" y="80" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">5</text>
  <text x="530" y="80" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">10</text>
  <line x1="270" y1="84" x2="530" y2="84" stroke="#1a4a56" stroke-width="0.5"/>

  <!-- 1. Agent Support: LC 9, LI 6 -->
  <rect x="30" y="92" width="220" height="46" rx="8" fill="#132f38" filter="url(#ld-s)"/>
  <text x="45" y="112" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Agent Support</text>
  <text x="45" y="128" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Multi-step reasoning chains</text>

  <!-- LC bar: 9/10 -->
  <rect x="270" y="96" width="234" height="16" rx="4" fill="url(#ld-lc)" filter="url(#ld-s)"/>
  <text x="512" y="108" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">9/10</text>
  <!-- LI bar: 6/10 -->
  <rect x="270" y="118" width="156" height="16" rx="4" fill="url(#ld-li)" filter="url(#ld-s)"/>
  <text x="434" y="130" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">6/10</text>

  <!-- Winner indicator -->
  <rect x="560" y="100" width="70" height="22" rx="11" fill="#3d8a9a" opacity="0.15"/>
  <text x="595" y="115" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">LC wins</text>

  <!-- 2. RAG Quality: LC 7, LI 9 -->
  <rect x="30" y="148" width="220" height="46" rx="8" fill="#132f38" filter="url(#ld-s)"/>
  <text x="45" y="168" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">RAG Quality</text>
  <text x="45" y="184" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Retrieval precision + chunking</text>

  <rect x="270" y="152" width="182" height="16" rx="4" fill="url(#ld-lc)" filter="url(#ld-s)"/>
  <text x="460" y="164" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">7/10</text>
  <rect x="270" y="174" width="234" height="16" rx="4" fill="url(#ld-li)" filter="url(#ld-s)"/>
  <text x="512" y="186" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">9/10</text>

  <rect x="560" y="156" width="70" height="22" rx="11" fill="#e8a87c" opacity="0.15"/>
  <text x="595" y="171" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">LI wins</text>

  <!-- 3. Integrations: LC 150+, LI 100+ -->
  <rect x="30" y="204" width="220" height="46" rx="8" fill="#132f38" filter="url(#ld-s)"/>
  <text x="45" y="224" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Integrations</text>
  <text x="45" y="240" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">LLMs, vector DBs, tools</text>

  <!-- Proportional: LC 150, LI 100, max=200 for scale. 260px max. -->
  <rect x="270" y="208" width="195" height="16" rx="4" fill="url(#ld-lc)" filter="url(#ld-s)"/>
  <text x="473" y="220" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">150+</text>
  <rect x="270" y="230" width="130" height="16" rx="4" fill="url(#ld-li)" filter="url(#ld-s)"/>
  <text x="408" y="242" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">100+</text>

  <rect x="560" y="212" width="70" height="22" rx="11" fill="#3d8a9a" opacity="0.15"/>
  <text x="595" y="227" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">LC wins</text>

  <!-- 4. Learning Curve (inverted - lower is better) -->
  <rect x="30" y="260" width="220" height="46" rx="8" fill="#132f38" filter="url(#ld-s)"/>
  <text x="45" y="280" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Learning Curve</text>
  <text x="45" y="296" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">Ease of getting started</text>

  <!-- LC: steep (8/10 difficulty) -->
  <rect x="270" y="264" width="208" height="16" rx="4" fill="url(#ld-lc)" filter="url(#ld-s)"/>
  <text x="486" y="276" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Steep</text>
  <!-- LI: moderate (5/10 difficulty) -->
  <rect x="270" y="286" width="130" height="16" rx="4" fill="url(#ld-li)" filter="url(#ld-s)"/>
  <text x="408" y="298" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Moderate</text>

  <rect x="560" y="268" width="70" height="22" rx="11" fill="#e8a87c" opacity="0.15"/>
  <text x="595" y="283" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">LI wins</text>

  <!-- 5. Community: LC 95K, LI 37K -->
  <rect x="30" y="316" width="220" height="46" rx="8" fill="#132f38" filter="url(#ld-s)"/>
  <text x="45" y="336" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Community</text>
  <text x="45" y="352" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9">GitHub stars + ecosystem</text>

  <!-- Proportional: 95K vs 37K, max ~100K. 260px max. -->
  <rect x="270" y="320" width="247" height="16" rx="4" fill="url(#ld-lc)" filter="url(#ld-s)"/>
  <text x="525" y="332" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">95K</text>
  <rect x="270" y="342" width="96" height="16" rx="4" fill="url(#ld-li)" filter="url(#ld-s)"/>
  <text x="374" y="354" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">37K</text>

  <rect x="560" y="324" width="70" height="22" rx="11" fill="#3d8a9a" opacity="0.15"/>
  <text x="595" y="339" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">LC wins</text>

  <!-- Verdict panel -->
  <rect x="650" y="92" width="130" height="268" rx="10" fill="#132f38" stroke="#1a4a56" stroke-width="1" filter="url(#ld-s)"/>
  <text x="715" y="116" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">SCORE</text>

  <text x="715" y="148" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">LangChain</text>
  <text x="715" y="176" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="32" font-weight="700" text-anchor="middle">3</text>

  <line x1="670" y1="192" x2="760" y2="192" stroke="#1a4a56" stroke-width="1"/>

  <text x="715" y="218" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">LlamaIndex</text>
  <text x="715" y="246" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="32" font-weight="700" text-anchor="middle">2</text>

  <line x1="670" y1="262" x2="760" y2="262" stroke="#1a4a56" stroke-width="1"/>

  <text x="715" y="286" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">LC wins on</text>
  <text x="715" y="300" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">breadth,</text>
  <text x="715" y="314" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">LI wins on</text>
  <text x="715" y="328" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">RAG depth</text>

  <!-- Bottom line -->
  <text x="400" y="390" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Both frameworks complement each other  --  many production systems use both</text>
</svg>