<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="hr-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#1a4a56"/>
    </linearGradient>
    <linearGradient id="hr-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#d4946a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">Hugging Face vs Replicate</text>
  <text x="400" y="54" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">ML model hosting and deployment platforms</text>

  <!-- HuggingFace Side -->
  <rect x="40" y="72" width="350" height="310" rx="10" fill="#132f38" stroke="#3d8a9a" stroke-width="1.5"/>

  <!-- HF Header -->
  <text x="215" y="100" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Hugging Face</text>
  <text x="215" y="116" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">Open ML ecosystem</text>

  <!-- HF Stats -->
  <rect x="60" y="130" width="145" height="56" rx="6" fill="#0f2d35"/>
  <text x="132" y="155" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="24" font-weight="800">800K+</text>
  <text x="132" y="175" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Models Available</text>

  <rect x="225" y="130" width="145" height="56" rx="6" fill="#0f2d35"/>
  <text x="297" y="155" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="24" font-weight="800">Free</text>
  <text x="297" y="175" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Inference API Tier</text>

  <!-- HF Features -->
  <rect x="60" y="200" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="60" y="200" width="310" height="30" rx="5" fill="#3d8a9a" opacity="0.15"/>
  <text x="75" y="220" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">Model hub + community ecosystem</text>

  <rect x="60" y="238" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="60" y="238" width="310" height="30" rx="5" fill="#3d8a9a" opacity="0.1"/>
  <text x="75" y="258" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">Transformers library integration</text>

  <rect x="60" y="276" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="60" y="276" width="310" height="30" rx="5" fill="#3d8a9a" opacity="0.15"/>
  <text x="75" y="296" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">Spaces for demos + apps</text>

  <rect x="60" y="314" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="60" y="314" width="310" height="30" rx="5" fill="#3d8a9a" opacity="0.1"/>
  <text x="75" y="334" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">Fine-tuning + training tools</text>

  <!-- HF Verdict -->
  <text x="215" y="370" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Best for: Model exploration + research</text>

  <!-- Replicate Side -->
  <rect x="410" y="72" width="350" height="310" rx="10" fill="#132f38" stroke="#e8a87c" stroke-width="1.5"/>

  <!-- Rep Header -->
  <text x="585" y="100" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Replicate</text>
  <text x="585" y="116" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">One-click model deployment</text>

  <!-- Rep Stats -->
  <rect x="430" y="130" width="145" height="56" rx="6" fill="#0f2d35"/>
  <text x="502" y="155" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="20" font-weight="800">Simple</text>
  <text x="502" y="175" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">API-first Design</text>

  <rect x="595" y="130" width="145" height="56" rx="6" fill="#0f2d35"/>
  <text x="667" y="155" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="20" font-weight="800">Pay/sec</text>
  <text x="667" y="175" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Per-Second Billing</text>

  <!-- Rep Features -->
  <rect x="430" y="200" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="430" y="200" width="310" height="30" rx="5" fill="#e8a87c" opacity="0.1"/>
  <text x="445" y="220" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">One-click model deployment</text>

  <rect x="430" y="238" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="430" y="238" width="310" height="30" rx="5" fill="#e8a87c" opacity="0.07"/>
  <text x="445" y="258" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">GPU auto-scaling + cold starts</text>

  <rect x="430" y="276" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="430" y="276" width="310" height="30" rx="5" fill="#e8a87c" opacity="0.1"/>
  <text x="445" y="296" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">Streaming outputs for media</text>

  <rect x="430" y="314" width="310" height="30" rx="5" fill="#0f2d35"/>
  <rect x="430" y="314" width="310" height="30" rx="5" fill="#e8a87c" opacity="0.07"/>
  <text x="445" y="334" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="12">Cog container format (custom models)</text>

  <!-- Rep Verdict -->
  <text x="585" y="370" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Best for: Fast deployment + production API</text>
