<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Space Grotesk', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0f2d35"/>

  <!-- Title -->
  <text x="400" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">GitHub Copilot Plans Comparison</text>
  <text x="400" y="54" fill="#a8c5cc" font-size="12" text-anchor="middle">Individual and team plans with key limits (April 2026)</text>

  <!-- Plan cards - 5 across -->

  <!-- Free -->
  <rect x="20" y="75" width="140" height="260" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="90" y="102" fill="#a8c5cc" font-size="12" font-weight="600" text-anchor="middle">FREE</text>
  <text x="90" y="132" fill="#e8a87c" font-size="28" font-weight="700" text-anchor="middle">$0</text>
  <text x="90" y="148" fill="#6a8a94" font-size="10" text-anchor="middle">forever</text>
  <line x1="36" y1="160" x2="144" y2="160" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="90" y="180" fill="#a8c5cc" font-size="10" text-anchor="middle">2,000 completions/mo</text>
  <text x="90" y="198" fill="#a8c5cc" font-size="10" text-anchor="middle">50 premium requests</text>
  <text x="90" y="216" fill="#a8c5cc" font-size="10" text-anchor="middle">Claude + GPT-4.1</text>
  <text x="90" y="234" fill="#a8c5cc" font-size="10" text-anchor="middle">VS Code, JetBrains</text>
  <text x="90" y="260" fill="#6a8a94" font-size="9" text-anchor="middle">Good for evaluation</text>

  <!-- Pro -->
  <rect x="172" y="75" width="140" height="260" rx="8" fill="#132f38" stroke="#e8a87c" stroke-width="2"/>
  <rect x="202" y="68" width="80" height="16" rx="8" fill="#e8a87c"/>
  <text x="242" y="79" fill="#0a1f25" font-size="9" font-weight="700" text-anchor="middle">BEST VALUE</text>
  <text x="242" y="102" fill="#a8c5cc" font-size="12" font-weight="600" text-anchor="middle">PRO</text>
  <text x="242" y="132" fill="#e8a87c" font-size="28" font-weight="700" text-anchor="middle">$10</text>
  <text x="242" y="148" fill="#6a8a94" font-size="10" text-anchor="middle">per month</text>
  <line x1="188" y1="160" x2="296" y2="160" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="242" y="180" fill="#ffffff" font-size="10" text-anchor="middle">Unlimited completions</text>
  <text x="242" y="198" fill="#ffffff" font-size="10" text-anchor="middle">300 premium requests</text>
  <text x="242" y="216" fill="#ffffff" font-size="10" text-anchor="middle">Coding agent access</text>
  <text x="242" y="234" fill="#ffffff" font-size="10" text-anchor="middle">All premium models</text>
  <text x="242" y="260" fill="#e8a87c" font-size="9" text-anchor="middle">Best for individual devs</text>

  <!-- Pro+ -->
  <rect x="324" y="75" width="140" height="260" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="394" y="102" fill="#a8c5cc" font-size="12" font-weight="600" text-anchor="middle">PRO+</text>
  <text x="394" y="132" fill="#e8a87c" font-size="28" font-weight="700" text-anchor="middle">$39</text>
  <text x="394" y="148" fill="#6a8a94" font-size="10" text-anchor="middle">per month</text>
  <line x1="340" y1="160" x2="448" y2="160" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="394" y="180" fill="#a8c5cc" font-size="10" text-anchor="middle">Unlimited completions</text>
  <text x="394" y="198" fill="#a8c5cc" font-size="10" text-anchor="middle">1,500 premium requests</text>
  <text x="394" y="216" fill="#a8c5cc" font-size="10" text-anchor="middle">Opus 4.6 + o3 access</text>
  <text x="394" y="234" fill="#a8c5cc" font-size="10" text-anchor="middle">Full Agent mode</text>
  <text x="394" y="260" fill="#6a8a94" font-size="9" text-anchor="middle">For power users</text>

  <!-- Business -->
  <rect x="476" y="75" width="140" height="260" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="546" y="102" fill="#a8c5cc" font-size="12" font-weight="600" text-anchor="middle">BUSINESS</text>
  <text x="546" y="132" fill="#e8a87c" font-size="28" font-weight="700" text-anchor="middle">$19</text>
  <text x="546" y="148" fill="#6a8a94" font-size="10" text-anchor="middle">per user/month</text>
  <line x1="492" y1="160" x2="600" y2="160" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="546" y="180" fill="#a8c5cc" font-size="10" text-anchor="middle">Everything in Pro</text>
  <text x="546" y="198" fill="#a8c5cc" font-size="10" text-anchor="middle">Org-wide policies</text>
  <text x="546" y="216" fill="#a8c5cc" font-size="10" text-anchor="middle">Audit logs + SSO</text>
  <text x="546" y="234" fill="#a8c5cc" font-size="10" text-anchor="middle">IP indemnity</text>
  <text x="546" y="260" fill="#6a8a94" font-size="9" text-anchor="middle">For teams</text>

  <!-- Enterprise -->
  <rect x="628" y="75" width="140" height="260" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <text x="698" y="102" fill="#a8c5cc" font-size="12" font-weight="600" text-anchor="middle">ENTERPRISE</text>
  <text x="698" y="132" fill="#e8a87c" font-size="28" font-weight="700" text-anchor="middle">$39</text>
  <text x="698" y="148" fill="#6a8a94" font-size="10" text-anchor="middle">per user/month</text>
  <line x1="644" y1="160" x2="752" y2="160" stroke="#1a4a56" stroke-opacity="0.5"/>
  <text x="698" y="180" fill="#a8c5cc" font-size="10" text-anchor="middle">1,000 premium req/user</text>
  <text x="698" y="198" fill="#a8c5cc" font-size="10" text-anchor="middle">Knowledge bases</text>
  <text x="698" y="216" fill="#a8c5cc" font-size="10" text-anchor="middle">Custom fine-tuning</text>
  <text x="698" y="234" fill="#a8c5cc" font-size="10" text-anchor="middle">GH Enterprise Cloud</text>
  <text x="698" y="260" fill="#6a8a94" font-size="9" text-anchor="middle">For large orgs</text>

  <!-- Premium requests comparison bar -->
  <text x="400" y="365" fill="#a8c5cc" font-size="11" text-anchor="middle">Premium requests: Free (50) | Pro (300) | Pro+ (1,500) | Enterprise (1,000/user)</text>

  <!-- Watermark -->
  <text x="780" y="390" fill="#6a8a94" font-size="10" text-anchor="end">PE Collective</text>
</svg>