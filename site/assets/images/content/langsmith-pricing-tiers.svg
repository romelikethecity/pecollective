<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="ls-cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#132f38"/>
    </linearGradient>
    <linearGradient id="ls-goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#d4946a"/>
    </linearGradient>
    <filter id="ls-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">LangSmith Pricing Tiers</text>
  <text x="400" y="60" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">LLM observability and evaluation platform</text>

  <!-- Free Tier -->
  <rect x="40" y="85" width="220" height="290" rx="10" fill="url(#ls-cardGrad)" stroke="#2a6a7a" stroke-width="1" filter="url(#ls-shadow)"/>
  <rect x="40" y="85" width="220" height="50" rx="10" fill="#1a4a56"/>
  <rect x="40" y="115" width="220" height="20" fill="#1a4a56"/>
  <text x="150" y="117" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Developer</text>
  <text x="150" y="162" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="32" font-weight="800">Free</text>
  <line x1="70" y1="182" x2="230" y2="182" stroke="#2a6a7a" stroke-width="1"/>
  <!-- Features -->
  <text x="80" y="208" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">5,000 traces/month</text>
  <circle cx="70" cy="204" r="3" fill="#3d8a9a"/>
  <text x="80" y="232" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">1 organization</text>
  <circle cx="70" cy="228" r="3" fill="#3d8a9a"/>
  <text x="80" y="256" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">14-day data retention</text>
  <circle cx="70" cy="252" r="3" fill="#3d8a9a"/>
  <text x="80" y="280" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Basic evaluation</text>
  <circle cx="70" cy="276" r="3" fill="#3d8a9a"/>
  <text x="80" y="304" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">Community support</text>
  <circle cx="70" cy="300" r="3" fill="#1a4a56"/>
  <!-- CTA -->
  <rect x="65" y="330" width="170" height="30" rx="6" fill="none" stroke="#3d8a9a" stroke-width="1.5"/>
  <text x="150" y="350" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Get Started</text>

  <!-- Plus Tier (Gold highlighted) -->
  <rect x="290" y="78" width="220" height="300" rx="10" fill="url(#ls-cardGrad)" stroke="#e8a87c" stroke-width="2" filter="url(#ls-shadow)"/>
  <!-- Popular badge -->
  <rect x="345" y="68" width="110" height="22" rx="11" fill="#e8a87c"/>
  <text x="400" y="83" text-anchor="middle" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="10" font-weight="800">MOST POPULAR</text>
  <rect x="290" y="88" width="220" height="50" rx="10" fill="#1a4a56"/>
  <rect x="290" y="118" width="220" height="20" fill="#1a4a56"/>
  <text x="400" y="120" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Plus</text>
  <text x="400" y="165" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="32" font-weight="800">$39</text>
  <text x="400" y="180" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">/seat/month</text>
  <line x1="320" y1="192" x2="480" y2="192" stroke="#2a6a7a" stroke-width="1"/>
  <!-- Features -->
  <text x="330" y="218" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">10,000 traces included</text>
  <circle cx="320" cy="214" r="3" fill="#e8a87c"/>
  <text x="330" y="242" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Unlimited organizations</text>
  <circle cx="320" cy="238" r="3" fill="#e8a87c"/>
  <text x="330" y="266" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">400-day retention</text>
  <circle cx="320" cy="262" r="3" fill="#e8a87c"/>
  <text x="330" y="290" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Online evaluation</text>
  <circle cx="320" cy="286" r="3" fill="#e8a87c"/>
  <text x="330" y="314" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">$0.50/1K extra traces</text>
  <circle cx="320" cy="310" r="3" fill="#e8a87c"/>
  <!-- CTA -->
  <rect x="315" y="335" width="170" height="30" rx="6" fill="url(#ls-goldGrad)"/>
  <text x="400" y="355" text-anchor="middle" fill="#0f2d35" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Start Free Trial</text>

  <!-- Enterprise Tier -->
  <rect x="540" y="85" width="220" height="290" rx="10" fill="url(#ls-cardGrad)" stroke="#2a6a7a" stroke-width="1" filter="url(#ls-shadow)"/>
  <rect x="540" y="85" width="220" height="50" rx="10" fill="#1a4a56"/>
  <rect x="540" y="115" width="220" height="20" fill="#1a4a56"/>
  <text x="650" y="117" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Enterprise</text>
  <text x="650" y="162" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">Custom</text>
  <text x="650" y="177" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11">contact sales</text>
  <line x1="570" y1="192" x2="730" y2="192" stroke="#2a6a7a" stroke-width="1"/>
  <!-- Features -->
  <text x="580" y="218" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Unlimited traces</text>
  <circle cx="570" cy="214" r="3" fill="#3d8a9a"/>
  <text x="580" y="242" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">SSO/SAML + RBAC</text>
  <circle cx="570" cy="238" r="3" fill="#3d8a9a"/>
  <text x="580" y="266" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Custom data retention</text>
  <circle cx="570" cy="262" r="3" fill="#3d8a9a"/>
  <text x="580" y="290" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Self-hosted option</text>
  <circle cx="570" cy="286" r="3" fill="#3d8a9a"/>
  <text x="580" y="314" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Dedicated support</text>
  <circle cx="570" cy="310" r="3" fill="#3d8a9a"/>
  <!-- CTA -->
  <rect x="565" y="330" width="170" height="30" rx="6" fill="none" stroke="#3d8a9a" stroke-width="1.5"/>
  <text x="650" y="350" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Contact Sales</text>
</svg>