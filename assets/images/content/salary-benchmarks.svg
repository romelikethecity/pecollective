<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter,system-ui,sans-serif">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2d35"/>
      <stop offset="100%" stop-color="#0a1f25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e4a55" stroke-width="0.5" opacity="0.4">
    <line x1="380" y1="100" x2="380" y2="480"/>
    <line x1="560" y1="100" x2="560" y2="480"/>
    <line x1="740" y1="100" x2="740" y2="480"/>
    <line x1="920" y1="100" x2="920" y2="480"/>
    <line x1="1100" y1="100" x2="1100" y2="480"/>
  </g>

  <!-- Title -->
  <text x="60" y="55" fill="#ffffff" font-size="28" font-weight="700">AI/ML Salary Benchmarks</text>
  <text x="60" y="82" fill="#6a8a94" font-size="14">Compensation ranges by role — based on disclosed job posting data</text>

  <!-- Salary axis labels -->
  <text x="380" y="116" fill="#6a8a94" font-size="12" text-anchor="middle">$100K</text>
  <text x="560" y="116" fill="#6a8a94" font-size="12" text-anchor="middle">$150K</text>
  <text x="740" y="116" fill="#6a8a94" font-size="12" text-anchor="middle">$200K</text>
  <text x="920" y="116" fill="#6a8a94" font-size="12" text-anchor="middle">$250K</text>
  <text x="1100" y="116" fill="#6a8a94" font-size="12" text-anchor="middle">$300K</text>

  <!-- Row 1: AI Product Manager -->
  <text x="60" y="170" fill="#ffffff" font-size="16" font-weight="600">AI Product Manager</text>
  <text x="60" y="190" fill="#a8c5cc" font-size="12">Senior · $165K – $240K</text>
  <rect x="472" y="157" width="270" height="28" rx="4" fill="url(#barGrad)"/>
  <rect x="472" y="157" width="270" height="28" rx="4" fill="#132f38" opacity="0.15"/>
  <text x="750" y="176" fill="#ffffff" font-size="13" font-weight="600" dx="8">$240K</text>

  <!-- Row 2: AI Engineer -->
  <text x="60" y="250" fill="#ffffff" font-size="16" font-weight="600">AI Engineer</text>
  <text x="60" y="270" fill="#a8c5cc" font-size="12">Mid-Senior · $161K – $230K</text>
  <rect x="460" y="237" width="248" height="28" rx="4" fill="url(#barGrad)"/>
  <rect x="460" y="237" width="248" height="28" rx="4" fill="#132f38" opacity="0.15"/>
  <text x="716" y="256" fill="#ffffff" font-size="13" font-weight="600" dx="8">$230K</text>

  <!-- Row 3: ML Engineer -->
  <text x="60" y="330" fill="#ffffff" font-size="16" font-weight="600">ML Engineer</text>
  <text x="60" y="350" fill="#a8c5cc" font-size="12">Mid-Senior · $145K – $210K</text>
  <rect x="422" y="317" width="234" height="28" rx="4" fill="url(#barGrad)"/>
  <rect x="422" y="317" width="234" height="28" rx="4" fill="#132f38" opacity="0.15"/>
  <text x="664" y="336" fill="#ffffff" font-size="13" font-weight="600" dx="8">$210K</text>

  <!-- Row 4: Prompt Engineer -->
  <text x="60" y="410" fill="#ffffff" font-size="16" font-weight="600">Prompt Engineer</text>
  <text x="60" y="430" fill="#a8c5cc" font-size="12">Entry-Mid · $130K – $190K</text>
  <rect x="396" y="397" width="216" height="28" rx="4" fill="url(#barGrad)"/>
  <rect x="396" y="397" width="216" height="28" rx="4" fill="#132f38" opacity="0.15"/>
  <text x="620" y="416" fill="#ffffff" font-size="13" font-weight="600" dx="8">$190K</text>

  <!-- Level legend -->
  <rect x="60" y="490" width="1080" height="1" fill="#1e4a55"/>
  <circle cx="80" cy="525" r="5" fill="#e8a87c" opacity="0.5"/>
  <text x="94" y="530" fill="#6a8a94" font-size="12">Entry</text>
  <circle cx="170" cy="525" r="5" fill="#e8a87c" opacity="0.75"/>
  <text x="184" y="530" fill="#6a8a94" font-size="12">Mid</text>
  <circle cx="240" cy="525" r="5" fill="#e8a87c"/>
  <text x="254" y="530" fill="#6a8a94" font-size="12">Senior</text>

  <!-- Entry-level markers (dimmer bars behind main bars) -->
  <!-- Row 1 entry -->
  <rect x="380" y="161" width="92" height="20" rx="3" fill="#3d8a9a" opacity="0.2"/>
  <!-- Row 2 entry -->
  <rect x="380" y="241" width="80" height="20" rx="3" fill="#3d8a9a" opacity="0.2"/>
  <!-- Row 3 entry -->
  <rect x="380" y="321" width="42" height="20" rx="3" fill="#3d8a9a" opacity="0.2"/>
  <!-- Row 4 entry -->
  <rect x="380" y="401" width="16" height="20" rx="3" fill="#3d8a9a" opacity="0.2"/>

  <!-- Source note -->
  <text x="1140" y="600" fill="#6a8a94" font-size="11" text-anchor="end">pecollective.com · Based on disclosed job posting data</text>
</svg>