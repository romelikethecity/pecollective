<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Space Grotesk', sans-serif">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0f2d35"/>

  <!-- Title -->
  <text x="40" y="34" fill="#ffffff" font-size="18" font-weight="700">LLM API Pricing: Input Cost Per 1M Tokens</text>
  <text x="40" y="52" fill="#a8c5cc" font-size="11">Sorted lowest to highest, April 2026</text>

  <!-- Grid lines: scale 0-$5 over 480px (260 to 740). 96px per $1 -->
  <g stroke="#1a4a56" stroke-opacity="0.5" stroke-width="1">
    <line x1="260" y1="64" x2="260" y2="360"/>
    <line x1="356" y1="64" x2="356" y2="360"/>
    <line x1="452" y1="64" x2="452" y2="360"/>
    <line x1="548" y1="64" x2="548" y2="360"/>
    <line x1="644" y1="64" x2="644" y2="360"/>
    <line x1="740" y1="64" x2="740" y2="360"/>
  </g>

  <!-- Scale labels -->
  <text x="260" y="378" fill="#6a8a94" font-size="10" text-anchor="middle">$0</text>
  <text x="356" y="378" fill="#6a8a94" font-size="10" text-anchor="middle">$1</text>
  <text x="452" y="378" fill="#6a8a94" font-size="10" text-anchor="middle">$2</text>
  <text x="548" y="378" fill="#6a8a94" font-size="10" text-anchor="middle">$3</text>
  <text x="644" y="378" fill="#6a8a94" font-size="10" text-anchor="middle">$4</text>
  <text x="740" y="378" fill="#6a8a94" font-size="10" text-anchor="middle">$5</text>

  <!-- Gemini Flash: $0.075 => 7px -->
  <text x="250" y="82" fill="#ffffff" font-size="11" text-anchor="end">Gemini Flash</text>
  <rect x="260" y="72" width="7" height="16" rx="2" fill="#3d8a9a"/>
  <text x="273" y="84" fill="#a8c5cc" font-size="10">$0.075</text>

  <!-- GPT-4.1 Nano: $0.10 => 10px -->
  <text x="250" y="112" fill="#ffffff" font-size="11" text-anchor="end">GPT-4.1 Nano</text>
  <rect x="260" y="102" width="10" height="16" rx="2" fill="#e8a87c"/>
  <text x="276" y="114" fill="#a8c5cc" font-size="10">$0.10</text>

  <!-- Mistral Small: $0.10 => 10px -->
  <text x="250" y="142" fill="#ffffff" font-size="11" text-anchor="end">Mistral Small</text>
  <rect x="260" y="132" width="10" height="16" rx="2" fill="#3d8a9a"/>
  <text x="276" y="144" fill="#a8c5cc" font-size="10">$0.10</text>

  <!-- Claude Haiku 4.5: $1.00 => 96px -->
  <text x="250" y="172" fill="#ffffff" font-size="11" text-anchor="end">Claude Haiku 4.5</text>
  <rect x="260" y="162" width="96" height="16" rx="2" fill="#e8a87c"/>
  <text x="361" y="174" fill="#a8c5cc" font-size="10">$1.00</text>

  <!-- o4-mini: $1.10 => 106px -->
  <text x="250" y="202" fill="#ffffff" font-size="11" text-anchor="end">o4-mini</text>
  <rect x="260" y="192" width="106" height="16" rx="2" fill="#3d8a9a"/>
  <text x="371" y="204" fill="#a8c5cc" font-size="10">$1.10</text>

  <!-- Gemini Pro: $1.25 => 120px -->
  <text x="250" y="232" fill="#ffffff" font-size="11" text-anchor="end">Gemini Pro</text>
  <rect x="260" y="222" width="120" height="16" rx="2" fill="#e8a87c"/>
  <text x="385" y="234" fill="#a8c5cc" font-size="10">$1.25</text>

  <!-- GPT-4.1: $2.00 => 192px -->
  <text x="250" y="262" fill="#ffffff" font-size="11" text-anchor="end">GPT-4.1</text>
  <rect x="260" y="252" width="192" height="16" rx="2" fill="#3d8a9a"/>
  <text x="457" y="264" fill="#a8c5cc" font-size="10">$2.00</text>

  <!-- Mistral Large: $2.00 => 192px -->
  <text x="250" y="292" fill="#ffffff" font-size="11" text-anchor="end">Mistral Large</text>
  <rect x="260" y="282" width="192" height="16" rx="2" fill="#e8a87c"/>
  <text x="457" y="294" fill="#a8c5cc" font-size="10">$2.00</text>

  <!-- Claude Sonnet 4.6: $3.00 => 288px -->
  <text x="250" y="322" fill="#ffffff" font-size="11" text-anchor="end">Claude Sonnet 4.6</text>
  <rect x="260" y="312" width="288" height="16" rx="2" fill="#3d8a9a"/>
  <text x="553" y="324" fill="#a8c5cc" font-size="10">$3.00</text>

  <!-- Claude Opus 4.6: $5.00 => 480px -->
  <text x="250" y="352" fill="#ffffff" font-size="11" text-anchor="end">Claude Opus 4.6</text>
  <rect x="260" y="342" width="480" height="16" rx="2" fill="#e8a87c"/>
  <text x="745" y="354" fill="#a8c5cc" font-size="10">$5.00</text>

  <!-- Watermark -->
  <text x="780" y="390" fill="#6a8a94" font-size="10" text-anchor="end">PE Collective</text>
</svg>