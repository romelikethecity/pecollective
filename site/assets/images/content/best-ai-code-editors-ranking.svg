    <text x="65" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">&#9733;&#9733;&#9733;</text>
    <text x="101" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">&#9734;&#9734;</text>
    <text x="130" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12" font-weight="700">3.8/5</text>
