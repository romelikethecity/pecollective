<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="pw-tealBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <linearGradient id="pw-goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4946a"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">Pinecone vs Weaviate</text>
  <text x="400" y="54" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">Vector database feature comparison</text>

  <!-- Legend -->
  <rect x="280" y="66" width="12" height="12" rx="2" fill="#3d8a9a"/>
  <text x="298" y="76" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Pinecone</text>
  <rect x="390" y="66" width="12" height="12" rx="2" fill="#e8a87c"/>
  <text x="408" y="76" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Weaviate</text>

  <!-- Category labels on left -->
  <!-- Row 1: Ease of Use -->
  <text x="40" y="118" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Ease of Use</text>
  <text x="40" y="132" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Setup to first query</text>
  <!-- Pinecone bar (9/10) -->
  <rect x="180" y="108" width="495" height="14" rx="4" fill="url(#pw-tealBar)"/>
  <text x="685" y="120" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">9/10</text>
  <!-- Weaviate bar (6/10) -->
  <rect x="180" y="126" width="330" height="14" rx="4" fill="url(#pw-goldBar)"/>
  <text x="520" y="138" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">6/10</text>

  <!-- Row 2: Hybrid Search -->
  <text x="40" y="175" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Hybrid Search</text>
  <text x="40" y="189" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Vector + keyword combined</text>
  <!-- Pinecone bar (6/10) -->
  <rect x="180" y="165" width="330" height="14" rx="4" fill="url(#pw-tealBar)"/>
  <text x="520" y="177" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">6/10</text>
  <!-- Weaviate bar (9/10) -->
  <rect x="180" y="183" width="495" height="14" rx="4" fill="url(#pw-goldBar)"/>
  <text x="685" y="195" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">9/10</text>

  <!-- Row 3: Scalability -->
  <text x="40" y="232" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Scalability</text>
  <text x="40" y="246" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">100M+ vector handling</text>
  <!-- Pinecone bar (9/10) -->
  <rect x="180" y="222" width="495" height="14" rx="4" fill="url(#pw-tealBar)"/>
  <text x="685" y="234" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">9/10</text>
  <!-- Weaviate bar (8/10) -->
  <rect x="180" y="240" width="440" height="14" rx="4" fill="url(#pw-goldBar)"/>
  <text x="630" y="252" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">8/10</text>

  <!-- Row 4: Self-Hosting -->
  <text x="40" y="289" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Self-Hosting</text>
  <text x="40" y="303" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">On-prem deployment</text>
  <!-- Pinecone bar (0/10) -->
  <rect x="180" y="279" width="6" height="14" rx="3" fill="#1a4a56"/>
  <text x="196" y="291" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12" font-weight="700">N/A</text>
  <!-- Weaviate bar (10/10) -->
  <rect x="180" y="297" width="550" height="14" rx="4" fill="url(#pw-goldBar)"/>
  <text x="740" y="309" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">10/10</text>

  <!-- Bottom summary boxes -->
  <rect x="40" y="330" width="350" height="52" rx="8" fill="#132f38" stroke="#3d8a9a" stroke-width="1"/>
  <text x="215" y="352" text-anchor="middle" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Pinecone</text>
  <text x="215" y="370" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Managed, serverless, from $70/mo</text>

  <rect x="410" y="330" width="350" height="52" rx="8" fill="#132f38" stroke="#e8a87c" stroke-width="1"/>
  <text x="585" y="352" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Weaviate</text>
  <text x="585" y="370" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">Open source, hybrid search, self-host option</text>
</svg>