    <rect x="10" y="10" width="38" height="38" rx="19" fill="#2a6a7a"/>
    <text x="29" y="36" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="900">3</text>
    <text x="65" y="30" fill="#ffffff" font-family="system-ui,sans-serif" font-size="16" font-weight="800">VS Code + Copilot</text>
    <text x="65" y="48" fill="#2a6a7a" font-family="system-ui,sans-serif" font-size="12">&#9733;&#9733;&#9733;&#9733;</text>
    <text x="113" y="48" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="12">&#9734;</text>
    <text x="130" y="48" fill="#2a6a7a" font-family="system-ui,sans-serif" font-size="12" font-weight="700">4.3/5</text>
