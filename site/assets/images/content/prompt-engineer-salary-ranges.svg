<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="salaryGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f0c4a8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="salaryTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4a56;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3d8a9a;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="rangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a6a7a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#e8a87c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0c4a8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>

  <!-- Title -->
  <text x="400" y="32" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Prompt Engineer Salary Ranges (2026)</text>
  <text x="400" y="50" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">U.S. market data across experience levels</text>

  <!-- Growth callout -->
  <rect x="580" y="15" width="200" height="42" rx="8" fill="#e8a87c" opacity="0.1" stroke="#e8a87c" stroke-width="1"/>
  <text x="680" y="33" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">3x Growth</text>
  <text x="680" y="48" fill="#f0c4a8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">in demand since 2024</text>

  <!-- Scale axis -->
  <line x1="200" y1="70" x2="200" y2="340" stroke="#1a4a56" stroke-width="1"/>
  <line x1="200" y1="340" x2="770" y2="340" stroke="#1a4a56" stroke-width="1"/>

  <!-- Scale labels -->
  <text x="200" y="358" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">$0</text>
  <text x="343" y="358" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">$100K</text>
  <text x="486" y="358" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">$200K</text>
  <text x="628" y="358" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">$300K</text>
  <text x="770" y="358" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">$400K</text>

  <!-- Gridlines -->
  <line x1="343" y1="70" x2="343" y2="340" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="486" y1="70" x2="486" y2="340" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="628" y1="70" x2="628" y2="340" stroke="#1a4a56" stroke-width="0.5" stroke-dasharray="3,6"/>

  <!-- Entry Level: $85K-$120K -->
  <text x="195" y="110" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="end">Entry Level</text>
  <text x="195" y="126" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">0-2 years</text>
  <!-- Range bar -->
  <rect x="322" y="95" width="50" height="40" rx="6" fill="url(#salaryTeal)"/>
  <!-- Min/max labels -->
  <text x="322" y="90" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">$85K</text>
  <text x="372" y="90" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">$120K</text>
  <!-- Median marker -->
  <line x1="347" y1="95" x2="347" y2="135" stroke="#ffffff" stroke-width="2"/>
  <text x="347" y="148" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">median $102K</text>

  <!-- Mid Level: $120K-$170K -->
  <text x="195" y="190" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="end">Mid Level</text>
  <text x="195" y="206" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">2-5 years</text>
  <rect x="372" y="175" width="72" height="40" rx="6" fill="url(#rangeGrad)" opacity="0.7"/>
  <text x="372" y="170" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">$120K</text>
  <text x="444" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">$170K</text>
  <line x1="408" y1="175" x2="408" y2="215" stroke="#ffffff" stroke-width="2"/>
  <text x="408" y="228" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">median $145K</text>

  <!-- Senior Level: $170K-$250K -->
  <text x="195" y="270" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="end">Senior</text>
  <text x="195" y="286" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">5-8 years</text>
  <rect x="444" y="255" width="115" height="40" rx="6" fill="url(#salaryGold)"/>
  <text x="444" y="250" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">$170K</text>
  <text x="559" y="250" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">$250K</text>
  <line x1="501" y1="255" x2="501" y2="295" stroke="#ffffff" stroke-width="2"/>
  <text x="501" y="308" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">median $210K</text>

  <!-- Lead / Director: $250K-$350K+ -->
  <text x="195" y="340" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="end">Lead / Director</text>
  <text x="195" y="356" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">8+ years</text>
  <rect x="559" y="325" width="150" height="15" rx="6" fill="url(#salaryGold)"/>
  <!-- Fading edge to indicate $350K+ -->
  <rect x="695" y="325" width="35" height="15" rx="6" fill="#f0c4a8" opacity="0.4"/>
  <text x="559" y="322" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">$250K</text>
  <text x="709" y="322" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">$350K+</text>

  <!-- Bottom note -->
  <text x="400" y="390" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Source: Aggregated from Glassdoor, Levels.fyi, and LinkedIn salary data (Q1 2026). Includes base + equity.</text>
</svg>