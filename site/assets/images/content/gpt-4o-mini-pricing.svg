<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="gpm-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#f0c4a8"/>
    </linearGradient>
    <linearGradient id="gpm-teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
    <linearGradient id="gpm-tealLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <filter id="gpm-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">LLM Pricing Comparison</text>
  <text x="400" y="64" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="12">Cost per 1M tokens (Input / Output)</text>

  <!-- Column headers -->
  <text x="370" y="100" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">INPUT COST</text>
  <text x="610" y="100" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">OUTPUT COST</text>

  <!-- GPT-4o Mini (Gold - cheapest) -->
  <rect x="30" y="120" width="740" height="70" rx="8" fill="#132f38" stroke="#e8a87c" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="120" width="4" height="70" rx="2" fill="#e8a87c"/>
  <!-- Star badge -->
  <rect x="42" y="128" width="70" height="18" rx="9" fill="#e8a87c" opacity="0.2"/>
  <text x="77" y="141" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="9" font-weight="700">CHEAPEST</text>
  <text x="46" y="165" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">GPT-4o Mini</text>
  <text x="46" y="182" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">OpenAI lightweight model</text>
  <!-- Input bar -->
  <rect x="250" y="135" width="18" height="40" rx="4" fill="url(#gpm-gold)" filter="url(#gpm-glow)"/>
  <text x="380" y="155" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="22" font-weight="700">$0.075</text>
  <text x="380" y="173" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">/1M tokens</text>
  <!-- Output bar -->
  <rect x="490" y="135" width="36" height="40" rx="4" fill="url(#gpm-gold)" filter="url(#gpm-glow)"/>
  <text x="620" y="155" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="22" font-weight="700">$0.30</text>
  <text x="620" y="173" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">/1M tokens</text>

  <!-- GPT-4.1 Nano -->
  <rect x="30" y="205" width="740" height="70" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <rect x="30" y="205" width="4" height="70" rx="2" fill="#3d8a9a"/>
  <text x="46" y="248" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">GPT-4.1 Nano</text>
  <text x="46" y="265" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">OpenAI ultra-efficient model</text>
  <!-- Input bar -->
  <rect x="250" y="220" width="24" height="40" rx="4" fill="url(#gpm-tealLight)"/>
  <text x="380" y="240" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="22" font-weight="700">$0.10</text>
  <text x="380" y="258" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">/1M tokens</text>
  <!-- Output bar -->
  <rect x="490" y="220" width="48" height="40" rx="4" fill="url(#gpm-tealLight)"/>
  <text x="620" y="240" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="22" font-weight="700">$0.40</text>
  <text x="620" y="258" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">/1M tokens</text>

  <!-- GPT-4o (Most expensive) -->
  <rect x="30" y="290" width="740" height="70" rx="8" fill="#132f38" stroke="#1a4a56" stroke-width="1"/>
  <rect x="30" y="290" width="4" height="70" rx="2" fill="#1a4a56"/>
  <text x="46" y="333" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">GPT-4o</text>
  <text x="46" y="350" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">OpenAI flagship model</text>
  <!-- Input bar -->
  <rect x="250" y="305" width="200" height="40" rx="4" fill="url(#gpm-teal)"/>
  <text x="380" y="325" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="22" font-weight="700">$2.50</text>
  <text x="380" y="343" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">/1M tokens</text>
  <!-- Output bar -->
  <rect x="490" y="305" width="120" height="40" rx="4" fill="url(#gpm-teal)"/>
  <text x="620" y="325" text-anchor="middle" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="22" font-weight="700">$10.00</text>
  <text x="620" y="343" text-anchor="middle" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">/1M tokens</text>

  <!-- Savings callout -->
  <text x="400" y="390" text-anchor="middle" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="600">GPT-4o Mini is 33x cheaper on input than GPT-4o</text>
</svg>