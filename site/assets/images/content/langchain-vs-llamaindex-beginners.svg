<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="dtree-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">LangChain vs LlamaIndex: Which Should You Pick?</text>

  <!-- Decision Node 1: Building RAG? -->
  <rect x="280" y="50" width="240" height="50" rx="25" fill="#1a4a56" stroke="#3d8a9a" stroke-width="2" filter="url(#dtree-shadow)"/>
  <text x="400" y="80" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Building RAG?</text>

  <!-- Arrow down-left (Yes) -->
  <line x1="340" y1="100" x2="200" y2="150" stroke="#e8a87c" stroke-width="2"/>
  <polygon points="200,150 208,142 212,152" fill="#e8a87c"/>
  <text x="255" y="122" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Yes</text>

  <!-- Arrow down-right (No) -->
  <line x1="460" y1="100" x2="600" y2="150" stroke="#a8c5cc" stroke-width="2"/>
  <polygon points="600,150 592,142 588,152" fill="#a8c5cc"/>
  <text x="540" y="122" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="13" font-weight="700">No</text>

  <!-- LlamaIndex result (left) -->
  <rect x="80" y="150" width="240" height="65" rx="12" fill="#132f38" stroke="#e8a87c" stroke-width="2" filter="url(#dtree-shadow)"/>
  <text x="200" y="175" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">LlamaIndex</text>
  <text x="200" y="200" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Purpose-built for retrieval pipelines</text>

  <!-- Decision Node 2: Complex agents? (right) -->
  <rect x="480" y="150" width="240" height="50" rx="25" fill="#1a4a56" stroke="#3d8a9a" stroke-width="2" filter="url(#dtree-shadow)"/>
  <text x="600" y="180" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Complex agents?</text>

  <!-- Arrow down-left from node 2 (Yes) -->
  <line x1="540" y1="200" x2="420" y2="252" stroke="#e8a87c" stroke-width="2"/>
  <polygon points="420,252 428,244 432,254" fill="#e8a87c"/>
  <text x="468" y="224" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Yes</text>

  <!-- Arrow down-right from node 2 (No) -->
  <line x1="660" y1="200" x2="700" y2="252" stroke="#a8c5cc" stroke-width="2"/>
  <polygon points="700,252 692,244 688,254" fill="#a8c5cc"/>
  <text x="690" y="224" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="13" font-weight="700">No</text>

  <!-- LangChain result (center-right) -->
  <rect x="300" y="252" width="240" height="65" rx="12" fill="#132f38" stroke="#3d8a9a" stroke-width="2" filter="url(#dtree-shadow)"/>
  <text x="420" y="277" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">LangChain</text>
  <text x="420" y="302" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Best multi-step agent framework</text>

  <!-- Default LangChain result (far right) -->
  <rect x="600" y="252" width="180" height="65" rx="12" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5" filter="url(#dtree-shadow)"/>
  <text x="690" y="277" fill="#2a6a7a" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Start LangChain</text>
  <text x="690" y="296" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Larger community,</text>
  <text x="690" y="308" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">more resources</text>

  <!-- GitHub stars comparison at bottom -->
  <rect x="120" y="340" width="260" height="46" rx="8" fill="#132f38"/>
  <circle cx="148" cy="363" r="14" fill="#1a4a56" stroke="#3d8a9a" stroke-width="1.5"/>
  <text x="148" y="367" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">LC</text>
  <text x="175" y="358" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LangChain</text>
  <text x="175" y="374" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">GitHub Stars</text>
  <text x="355" y="367" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="end">95K</text>

  <rect x="420" y="340" width="260" height="46" rx="8" fill="#132f38"/>
  <circle cx="448" cy="363" r="14" fill="#1a4a56" stroke="#e8a87c" stroke-width="1.5"/>
  <text x="448" y="367" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">LI</text>
  <text x="475" y="358" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">LlamaIndex</text>
  <text x="475" y="374" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11">GitHub Stars</text>
  <text x="655" y="367" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="end">37K</text>
</svg>