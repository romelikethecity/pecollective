<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="ls-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <linearGradient id="wb-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>
  <!-- VS badge center -->
  <circle cx="400" cy="35" r="18" fill="#132f38" stroke="#6a8a94" stroke-width="1.5"/>
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11" font-weight="800">VS</text>
  <!-- Left header -->
  <g transform="translate(30,15)">
    <text x="0" y="20" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="22" font-weight="800">LangSmith</text>
    <text x="0" y="38" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="11">$39/seat/mo | LLM Tracing</text>
  </g>
  <!-- Right header -->
  <g transform="translate(770,15)">
    <text x="0" y="20" text-anchor="end" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="22" font-weight="800">Weights &amp; Biases</text>
    <text x="0" y="38" text-anchor="end" fill="#6a8a94" font-family="system-ui,sans-serif" font-size="11">$50/seat/mo | ML Experiments</text>
  </g>
  <!-- Comparison rows -->
  <!-- Row 1: LLM Tracing -->
  <g transform="translate(0,72)">
    <text x="400" y="12" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">LLM Tracing &amp; Debugging</text>
    <!-- LS bar: 9.5/10 from right edge of left half -->
    <rect x="50" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="50" y="20" width="304" height="20" rx="4" fill="url(#ls-fill)"/>
    <text x="340" y="35" text-anchor="end" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">9.5</text>
    <!-- WB bar -->
    <rect x="430" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="430" y="20" width="192" height="20" rx="4" fill="url(#wb-fill)"/>
    <text x="634" y="35" text-anchor="start" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10" font-weight="700"> 6.0</text>
  </g>
  <!-- Row 2: Experiment Tracking -->
  <g transform="translate(0,130)">
    <text x="400" y="12" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Experiment Tracking</text>
    <rect x="50" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="50" y="20" width="224" height="20" rx="4" fill="url(#ls-fill)"/>
    <text x="280" y="35" text-anchor="end" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">7.0</text>
    <rect x="430" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="430" y="20" width="304" height="20" rx="4" fill="url(#wb-fill)"/>
    <text x="720" y="35" text-anchor="end" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="10" font-weight="700">9.5</text>
  </g>
  <!-- Row 3: Cost Efficiency -->
  <g transform="translate(0,188)">
    <text x="400" y="12" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Cost Efficiency</text>
    <rect x="50" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="50" y="20" width="256" height="20" rx="4" fill="url(#ls-fill)"/>
    <text x="312" y="35" text-anchor="end" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">8.0</text>
    <rect x="430" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="430" y="20" width="224" height="20" rx="4" fill="url(#wb-fill)"/>
    <text x="660" y="35" text-anchor="end" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="10" font-weight="700">7.0</text>
  </g>
  <!-- Row 4: Ecosystem -->
  <g transform="translate(0,246)">
    <text x="400" y="12" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Ecosystem &amp; Integrations</text>
    <rect x="50" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="50" y="20" width="240" height="20" rx="4" fill="url(#ls-fill)"/>
    <text x="296" y="35" text-anchor="end" fill="#ffffff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">7.5</text>
    <text x="54" y="34" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="8">LangChain native</text>
    <rect x="430" y="20" width="320" height="20" rx="4" fill="#0f2d35" stroke="#1a4a56" stroke-width="0.5"/>
    <rect x="430" y="20" width="288" height="20" rx="4" fill="url(#wb-fill)"/>
    <text x="724" y="35" text-anchor="end" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="10" font-weight="700">9.0</text>
    <text x="434" y="34" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="8">PyTorch, TF, HF</text>
  </g>
  <!-- Bottom verdict boxes -->
  <g transform="translate(30,300)">
    <rect x="0" y="0" width="350" height="80" rx="12" fill="#132f38" stroke="#3d8a9a" stroke-width="1.5"/>
    <text x="175" y="22" text-anchor="middle" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="11" font-weight="700">CHOOSE LANGSMITH IF:</text>
    <circle cx="25" cy="42" r="3" fill="#3d8a9a"/>
    <text x="35" y="46" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10">You use LangChain and need LLM tracing</text>
    <circle cx="25" cy="62" r="3" fill="#3d8a9a"/>
    <text x="35" y="66" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10">You need prompt debugging &amp; evaluation</text>
  </g>
  <g transform="translate(420,300)">
    <rect x="0" y="0" width="350" height="80" rx="12" fill="#132f38" stroke="#e8a87c" stroke-width="1.5"/>
    <text x="175" y="22" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="11" font-weight="700">CHOOSE W&amp;B IF:</text>
    <circle cx="25" cy="42" r="3" fill="#e8a87c"/>
    <text x="35" y="46" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10">You train/fine-tune ML models</text>
    <circle cx="25" cy="62" r="3" fill="#e8a87c"/>
    <text x="35" y="66" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10">You need a model registry &amp; versioning</text>
  </g>
</svg>