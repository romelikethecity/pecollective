<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="oai-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#0f2d35" stop-opacity="0"/>
    </radialGradient>
    <filter id="oai-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">OpenAI API Ecosystem</text>
  <!-- Center hub -->
  <circle cx="400" cy="210" r="55" fill="#132f38" stroke="#e8a87c" stroke-width="2.5"/>
  <circle cx="400" cy="210" r="45" fill="url(#oai-center)" opacity="0.15"/>
  <text x="400" y="203" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="18" font-weight="800">GPT-5</text>
  <text x="400" y="222" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="10">Core Model</text>
  <!-- Spokes + Nodes -->
  <!-- Chat Completions - top left -->
  <line x1="355" y1="170" x2="175" y2="85" stroke="#3d8a9a" stroke-width="1.5" opacity="0.6"/>
  <rect x="80" y="55" width="160" height="58" rx="10" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5" filter="url(#oai-shadow)"/>
  <text x="160" y="77" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Chat Completions</text>
  <text x="160" y="96" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">$2.50-$10 / 1M tokens</text>
  <!-- Assistants API - top right -->
  <line x1="445" y1="170" x2="625" y2="85" stroke="#3d8a9a" stroke-width="1.5" opacity="0.6"/>
  <rect x="540" y="55" width="160" height="58" rx="10" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5" filter="url(#oai-shadow)"/>
  <text x="620" y="77" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Assistants API</text>
  <text x="620" y="96" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">Threads + Tools</text>
  <!-- DALL-E 3 - right -->
  <line x1="455" y1="210" x2="575" y2="210" stroke="#3d8a9a" stroke-width="1.5" opacity="0.6"/>
  <rect x="580" y="182" width="160" height="58" rx="10" fill="#132f38" stroke="#e8a87c" stroke-width="1.5" filter="url(#oai-shadow)"/>
  <text x="660" y="204" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">DALL-E 3</text>
  <text x="660" y="223" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">$0.040 / image (HD)</text>
  <!-- Whisper - bottom right -->
  <line x1="445" y1="250" x2="600" y2="325" stroke="#3d8a9a" stroke-width="1.5" opacity="0.6"/>
  <rect x="525" y="300" width="160" height="58" rx="10" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5" filter="url(#oai-shadow)"/>
  <text x="605" y="322" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Whisper</text>
  <text x="605" y="341" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">$0.006 / minute</text>
  <!-- Embeddings - bottom left -->
  <line x1="355" y1="250" x2="200" y2="325" stroke="#3d8a9a" stroke-width="1.5" opacity="0.6"/>
  <rect x="100" y="300" width="160" height="58" rx="10" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5" filter="url(#oai-shadow)"/>
  <text x="180" y="322" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Embeddings</text>
  <text x="180" y="341" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">$0.13 / 1M tokens</text>
  <!-- Fine-tuning - left -->
  <line x1="345" y1="210" x2="220" y2="210" stroke="#3d8a9a" stroke-width="1.5" opacity="0.6"/>
  <rect x="40" y="182" width="175" height="58" rx="10" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5" filter="url(#oai-shadow)"/>
  <text x="128" y="204" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Fine-tuning</text>
  <text x="128" y="223" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10">$25 / 1M training tokens</text>
  <!-- Small decorative dots on spoke midpoints -->
  <circle cx="175" cy="85" r="3" fill="#3d8a9a"/>
  <circle cx="625" cy="85" r="3" fill="#3d8a9a"/>
  <circle cx="575" cy="210" r="3" fill="#3d8a9a"/>
  <circle cx="600" cy="325" r="3" fill="#3d8a9a"/>
  <circle cx="200" cy="325" r="3" fill="#3d8a9a"/>
  <circle cx="220" cy="210" r="3" fill="#3d8a9a"/>
</svg>