<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="cf-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="cf-rating" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="86%" stop-color="#e8a87c"/>
      <stop offset="86%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#1a4a56"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35" rx="12"/>

  <!-- Header area with terminal look -->
  <rect x="25" y="15" width="750" height="44" rx="8" fill="#132f38" filter="url(#cf-shadow)"/>
  <circle cx="48" cy="37" r="6" fill="#e8a87c" opacity="0.8"/>
  <circle cx="68" cy="37" r="6" fill="#3d8a9a" opacity="0.8"/>
  <circle cx="88" cy="37" r="6" fill="#2a6a7a" opacity="0.8"/>
  <text x="120" y="42" fill="#a8c5cc" font-family="monospace" font-size="13">~ claude</text>
  <text x="210" y="42" fill="#6a8a94" font-family="monospace" font-size="13">--review</text>

  <!-- Badge: Best for autonomous coding -->
  <rect x="520" y="22" width="240" height="28" rx="14" fill="#e8a87c" opacity="0.15" stroke="#e8a87c" stroke-width="1"/>
  <text x="640" y="41" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">BEST FOR AUTONOMOUS CODING</text>

  <!-- Title -->
  <text x="400" y="86" fill="#ffffff" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Claude Code Feature Showcase</text>

  <!-- Rating and price -->
  <rect x="270" y="96" width="120" height="28" rx="6" fill="#132f38"/>
  <!-- Stars -->
  <text x="282" y="115" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="14">&#9733;&#9733;&#9733;&#9733;</text>
  <text x="337" y="115" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="14">&#9733;</text>
  <text x="355" y="115" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="13" font-weight="600">4.3</text>

  <rect x="400" y="96" width="130" height="28" rx="6" fill="#132f38"/>
  <text x="465" y="115" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">$20/mo</text>

  <!-- Feature cards in staggered grid -->

  <!-- Feature 1: Terminal Interface -->
  <rect x="30" y="140" width="225" height="78" rx="10" fill="#132f38" filter="url(#cf-shadow)"/>
  <rect x="30" y="140" width="225" height="4" rx="2" fill="#e8a87c"/>
  <rect x="44" y="156" width="36" height="36" rx="8" fill="#1a4a56"/>
  <text x="62" y="180" fill="#e8a87c" font-family="monospace" font-size="18" text-anchor="middle">&gt;_</text>
  <text x="92" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Terminal Interface</text>
  <text x="92" y="188" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Works in any terminal, no IDE needed</text>
  <text x="92" y="202" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">SSH-friendly, headless capable</text>

  <!-- Feature 2: Full Codebase Awareness -->
  <rect x="270" y="140" width="250" height="78" rx="10" fill="#132f38" filter="url(#cf-shadow)"/>
  <rect x="270" y="140" width="250" height="4" rx="2" fill="#3d8a9a"/>
  <rect x="284" y="156" width="36" height="36" rx="8" fill="#1a4a56"/>
  <text x="302" y="178" fill="#3d8a9a" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">{..}</text>
  <text x="332" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Full Codebase Awareness</text>
  <text x="332" y="188" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Reads entire repo, understands architecture</text>
  <text x="332" y="202" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Navigates dependencies automatically</text>

  <!-- Feature 3: Git Integration -->
  <rect x="535" y="140" width="235" height="78" rx="10" fill="#132f38" filter="url(#cf-shadow)"/>
  <rect x="535" y="140" width="235" height="4" rx="2" fill="#2a6a7a"/>
  <rect x="549" y="156" width="36" height="36" rx="8" fill="#1a4a56"/>
  <text x="567" y="180" fill="#2a6a7a" font-family="monospace" font-size="14" text-anchor="middle">git</text>
  <text x="597" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Git Integration</text>
  <text x="597" y="188" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Commits, branches, PR descriptions</text>
  <text x="597" y="202" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Built-in diff awareness</text>

  <!-- Feature 4: Multi-file Editing -->
  <rect x="30" y="232" width="235" height="78" rx="10" fill="#132f38" filter="url(#cf-shadow)"/>
  <rect x="30" y="232" width="235" height="4" rx="2" fill="#f0c4a8"/>
  <rect x="44" y="248" width="36" height="36" rx="8" fill="#1a4a56"/>
  <text x="62" y="271" fill="#f0c4a8" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">[+]</text>
  <text x="92" y="262" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Multi-file Editing</text>
  <text x="92" y="280" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Coordinates changes across files</text>
  <text x="92" y="294" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Refactors, renames, migrations</text>

  <!-- Feature 5: Custom System Prompts -->
  <rect x="280" y="232" width="250" height="78" rx="10" fill="#132f38" filter="url(#cf-shadow)"/>
  <rect x="280" y="232" width="250" height="4" rx="2" fill="#e8a87c"/>
  <rect x="294" y="248" width="36" height="36" rx="8" fill="#1a4a56"/>
  <text x="312" y="271" fill="#e8a87c" font-family="monospace" font-size="14" text-anchor="middle">.md</text>
  <text x="342" y="262" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Custom System Prompts</text>
  <text x="342" y="280" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">CLAUDE.md project-level config</text>
  <text x="342" y="294" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10">Persistent coding standards</text>

  <!-- Who it's for panel -->
  <rect x="545" y="232" width="225" height="78" rx="10" fill="#1a4a56" filter="url(#cf-shadow)"/>
  <text x="657" y="256" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">IDEAL FOR</text>
  <text x="657" y="276" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Senior devs who want AI to</text>
  <text x="657" y="294" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">handle entire tasks end-to-end</text>

  <!-- Bottom comparison strip -->
  <rect x="30" y="330" width="740" height="55" rx="10" fill="#132f38"/>
  <text x="65" y="352" fill="#6a8a94" font-family="system-ui, sans-serif" font-size="10" font-weight="600">COMPARED TO</text>

  <rect x="155" y="340" width="115" height="28" rx="6" fill="#1a4a56"/>
  <text x="212" y="358" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Copilot: IDE-first</text>

  <rect x="285" y="340" width="115" height="28" rx="6" fill="#1a4a56"/>
  <text x="342" y="358" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Cursor: Editor-first</text>

  <rect x="415" y="340" width="130" height="28" rx="6" fill="#1a4a56"/>
  <text x="480" y="358" fill="#a8c5cc" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Windsurf: Flow-first</text>

  <rect x="560" y="340" width="190" height="28" rx="6" fill="#e8a87c" opacity="0.15"/>
  <text x="655" y="358" fill="#e8a87c" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Claude Code: Autonomy-first</text>
</svg>