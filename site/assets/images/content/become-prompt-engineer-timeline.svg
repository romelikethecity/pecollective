<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="tl-phase1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4a56"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
    <linearGradient id="tl-phase2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="100%" stop-color="#3d8a9a"/>
    </linearGradient>
    <linearGradient id="tl-phase3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d8a9a"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
    <linearGradient id="tl-phase4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#f0c4a8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0f2d35"/>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Become a Prompt Engineer: 12-Week Roadmap</text>
  <!-- Main timeline track -->
  <rect x="50" y="160" width="700" height="6" rx="3" fill="#132f38"/>
  <!-- Phase segments on the track -->
  <rect x="50" y="160" width="165" height="6" rx="3" fill="url(#tl-phase1)"/>
  <rect x="215" y="160" width="175" height="6" rx="3" fill="url(#tl-phase2)"/>
  <rect x="390" y="160" width="175" height="6" rx="3" fill="url(#tl-phase3)"/>
  <rect x="565" y="160" width="185" height="6" rx="3" fill="url(#tl-phase4)"/>
  <!-- Phase markers (circles on track) -->
  <circle cx="50" cy="163" r="8" fill="#1a4a56" stroke="#3d8a9a" stroke-width="2"/>
  <text x="50" y="167" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="8" font-weight="700">1</text>
  <circle cx="215" cy="163" r="8" fill="#2a6a7a" stroke="#3d8a9a" stroke-width="2"/>
  <text x="215" y="167" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="8" font-weight="700">4</text>
  <circle cx="390" cy="163" r="8" fill="#3d8a9a" stroke="#e8a87c" stroke-width="2"/>
  <text x="390" y="167" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="8" font-weight="700">7</text>
  <circle cx="565" cy="163" r="8" fill="#e8a87c" stroke="#f0c4a8" stroke-width="2"/>
  <text x="565" y="167" text-anchor="middle" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="8" font-weight="700">10</text>
  <!-- End marker -->
  <circle cx="750" cy="163" r="10" fill="#e8a87c" stroke="#f0c4a8" stroke-width="2.5"/>
  <text x="750" y="167" text-anchor="middle" fill="#0f2d35" font-family="system-ui,sans-serif" font-size="8" font-weight="800">12</text>
  <!-- Phase 1 card (above track) -->
  <g transform="translate(25,55)">
    <rect x="0" y="0" width="170" height="90" rx="10" fill="#132f38" stroke="#1a4a56" stroke-width="1.5"/>
    <rect x="0" y="0" width="170" height="4" rx="2" fill="url(#tl-phase1)"/>
    <text x="85" y="25" text-anchor="middle" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="10" font-weight="700">WEEKS 1-3</text>
    <text x="85" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Fundamentals</text>
    <text x="85" y="62" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">LLM basics, prompt</text>
    <text x="85" y="76" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">patterns, CoT, few-shot</text>
    <!-- Connector line -->
    <line x1="85" y1="90" x2="85" y2="105" stroke="#1a4a56" stroke-width="1.5"/>
  </g>
  <!-- Phase 2 card (below track) -->
  <g transform="translate(195,185)">
    <line x1="85" y1="0" x2="85" y2="15" stroke="#2a6a7a" stroke-width="1.5"/>
    <rect x="0" y="15" width="180" height="90" rx="10" fill="#132f38" stroke="#2a6a7a" stroke-width="1.5"/>
    <rect x="0" y="101" width="180" height="4" rx="2" fill="url(#tl-phase2)"/>
    <text x="90" y="38" text-anchor="middle" fill="#3d8a9a" font-family="system-ui,sans-serif" font-size="10" font-weight="700">WEEKS 4-6</text>
    <text x="90" y="58" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Tools &amp; APIs</text>
    <text x="90" y="75" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">OpenAI API, LangChain</text>
    <text x="90" y="89" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">RAG systems, evaluation</text>
  </g>
  <!-- Phase 3 card (above track) -->
  <g transform="translate(365,55)">
    <rect x="0" y="0" width="170" height="90" rx="10" fill="#132f38" stroke="#3d8a9a" stroke-width="1.5"/>
    <rect x="0" y="0" width="170" height="4" rx="2" fill="url(#tl-phase3)"/>
    <text x="85" y="25" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10" font-weight="700">WEEKS 7-9</text>
    <text x="85" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Build Portfolio</text>
    <text x="85" y="62" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">3-5 projects, GitHub</text>
    <text x="85" y="76" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">demos, blog posts</text>
    <line x1="85" y1="90" x2="85" y2="105" stroke="#3d8a9a" stroke-width="1.5"/>
  </g>
  <!-- Phase 4 card (below track) -->
  <g transform="translate(540,185)">
    <line x1="85" y1="0" x2="85" y2="15" stroke="#e8a87c" stroke-width="1.5"/>
    <rect x="0" y="15" width="195" height="90" rx="10" fill="#132f38" stroke="#e8a87c" stroke-width="2"/>
    <rect x="0" y="101" width="195" height="4" rx="2" fill="url(#tl-phase4)"/>
    <text x="98" y="38" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="10" font-weight="700">WEEKS 10-12</text>
    <text x="98" y="58" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Job Search</text>
    <text x="98" y="75" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">Resume, networking</text>
    <text x="98" y="89" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">interview prep, apply</text>
  </g>
  <!-- Salary milestone -->
  <g transform="translate(250,340)">
    <rect x="0" y="0" width="300" height="45" rx="22" fill="#132f38" stroke="#e8a87c" stroke-width="2"/>
    <text x="30" y="28" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="18">&#127942;</text>
    <text x="60" y="22" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="9">ENTRY-LEVEL SALARY</text>
    <text x="60" y="38" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="18" font-weight="800">$80K - $120K</text>
  </g>
</svg>