    <rect x="10" y="10" width="38" height="38" rx="19" fill="#1a4a56"/>
    <text x="29" y="36" text-anchor="middle" fill="#a8c5cc" font-family="system-ui,sans-serif" font-size="18" font-weight="900">4</text>
